<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <title>Grader_cs2</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1a1735, #090816 80%);
      color: white;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      min-height: 100vh;
    }

    .header {
      display: flex;
      justify-content: flex-end;
      padding: 12px; 
    }

    .header-box {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.08);
      padding: 8px 12px;
      border-radius: 14px;
    }

    .balance-box {
      display: flex;
      align-items: center;
      gap: 5px;
      font-weight: bold;
    }

    .balance-box span { color: gold; }

    .add-btn {
      background: #ff9f43;
      border: none;
      color: black;
      font-size: 18px;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #333;
    }

    .menu {
      position: absolute;
      top: 70px;
      right: 12px;
      background: rgba(0,0,0,0.95);
      padding: 12px;
      border-radius: 12px;
      width: 200px;
      display: none;
      z-index: 1000;
      box-shadow: 0 4px 20px rgba(0,0,0,0.8);
    }

    .menu button {
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: black;
      background: #fff;
      font-weight: bold;
    }

    .case-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      max-width: 400px;
      margin: 0 auto;
      gap: 12px;
      padding: 15px;
    }

    .case {
      cursor: pointer;
    }

    .case-box {
      border-radius: 18px;
      padding: 10px;
      text-align: center;
      background: rgba(255,255,255,0.03);
    }

    .case-img-box {
      height: 70px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .case-img-box img {
      max-width: 100%;
      height: auto;
      object-fit: contain;
    }

    .case:nth-child(1) .case-box { border: 2px solid #cd7f32; }
    .case:nth-child(2) .case-box { border: 2px solid #c0c0c0; }
    .case:nth-child(3) .case-box { border: 2px solid gold; }
    .case:nth-child(4) .case-box { border: 2px solid #7f8cff; }
    .case:nth-child(5) .case-box { border: 2px solid #ff3c6f; }
    .case:nth-child(6) .case-box { border: 2px solid #00eaff; }
    .purple-case { border: 2px solid #a855f7; }
    .white-case { border: 2px solid #ffffff; }

    .title { margin-top: 6px; font-size: 12px; font-weight: bold; }
    .price { color: gold; margin-top: 2px; font-size: 11px; }

    .promo-modal {
      position: fixed;
      top: 20px; left: 50%;
      transform: translateX(-50%);
      display: none;
      z-index: 3000;
    }

    .promo-box {
      position: relative;
      background: #111;
      padding: 15px;
      border-radius: 14px;
      width: 280px;
      border: 1px solid #333;
    }

    .promo-input-box {
      display: flex;
      gap: 8px;
      margin-top: 10px;
      background: rgba(255,255,255,0.05);
      padding: 5px;
      border-radius: 10px;
    }

    .promo-input-box input {
      flex: 1;
      background: transparent;
      border: none;
      color: white;
      outline: none;
      width: 50px;
    }

    .promo-btn {
      background: #ff9f43;
      border: none;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      color: black;
    }

    #rouletteModal {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
    }

    .roulette-content {
      width: 90%;
      max-width: 500px;
      background: #111;
      border-radius: 16px;
      padding: 20px;
      position: relative;
    }

    .roulette-window {
      position: relative;
      height: 90px;
      overflow: hidden;
      border: 2px solid #333;
      border-radius: 10px;
      background: #050505;
      margin: 20px 0;
    }

    .pointer {
      position: absolute;
      left: 50%; top: 0; bottom: 0;
      width: 2px;
      background: #ff9f43;
      z-index: 20;
      transform: translateX(-50%);
    }

    #rouletteTrack {
      display: flex;
      position: absolute;
      left: 0; top: 0; height: 100%;
    }

    .roulette-item {
      min-width: 90px;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .roulette-item img {
      width: 70px;
      height: 50px;
      object-fit: contain;
    }

    #openBtn {
      width: 100%;
      padding: 15px;
      background: #ff9f43;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      color: black !important;
      font-size: 16px;
    }

    #skinsList {
      margin-top: 15px; 
      display: grid; 
      grid-template-columns: repeat(5, 1fr); 
      gap: 5px; 
      max-height: 120px; 
      overflow-y: auto;
    }

    #skinsList img {
      width: 100%; height: 50px; object-fit: contain;
    }
  </style>
</head>

<body>

<div class="header">
  <div class="header-box">
    <div class="balance-box">
      <span id="balance">0</span> ⭐
    </div>
    <button class="add-btn" onclick="alert('Soon')">+</button>
    <button class="add-btn" onclick="openPromo()">🎟</button>
    <div class="profile" onclick="toggleMenu()">
      <img id="avatar" class="avatar">
      <div id="name">User</div>
    </div>
  </div>

  <div class="menu" id="menu">
    <div style="font-size: 12px; margin-bottom: 5px;">🔊 Гучність</div>
    <input type="range" id="volumeSlider" min="0" max="100" value="50" style="width:100%">
    <button onclick="window.location.href='inventory.html'">🎒 Inventory</button>
    <button onclick="window.location.href='upgrade.html'">⚡ Upgrade</button>
  </div>
</div>

<div class="case-grid">
  <div class="case" onclick="openCase(1)"><div class="case-box"><div class="case-img-box"><img src="bronze.png"></div><div class="title">Bronze</div><div class="price">1 ⭐</div></div></div>
  <div class="case" onclick="openCase(3)"><div class="case-box"><div class="case-img-box"><img src="silver.png"></div><div class="title">Silver</div><div class="price">3 ⭐</div></div></div>
  <div class="case" onclick="openCase(5)"><div class="case-box"><div class="case-img-box"><img src="gold.png"></div><div class="title">Gold</div><div class="price">5 ⭐</div></div></div>
  <div class="case" onclick="openCase(10)"><div class="case-box"><div class="case-img-box"><img src="platinum.png"></div><div class="title">Platinum</div><div class="price">10 ⭐</div></div></div>
  <div class="case" onclick="openCase(25)"><div class="case-box"><div class="case-img-box"><img src="ruby.png"></div><div class="title">Ruby</div><div class="price">25 ⭐</div></div></div>
  <div class="case" onclick="openCase(50)"><div class="case-box"><div class="case-img-box"><img src="diamond.png"></div><div class="title">Diamond</div><div class="price">50 ⭐</div></div></div>
  
  <div class="case" onclick="startRoulette('glock')"><div class="case-box purple-case"><div class="case-img-box"><img src="glock_case.png"></div><div class="title">Glock Case</div><div class="price">15 ⭐</div></div></div>
  <div class="case" onclick="startRoulette('usp')"><div class="case-box white-case"><div class="case-img-box"><img src="usp_case.png"></div><div class="title">USP-S Case</div><div class="price">15 ⭐</div></div></div>
</div>

<div class="promo-modal" id="promoModal">
  <div class="promo-box">
    <div onclick="closePromo()" style="position:absolute; right:10px; top:5px; cursor:pointer;">✖</div>
    <div style="text-align:center; font-weight:bold;">Промокод</div>
    <div class="promo-input-box">
      <input type="text" id="promoInput" placeholder="Код">
      <button class="promo-btn" onclick="applyPromo()">OK</button>
    </div>
  </div>
</div>

<div id="rouletteModal">
  <div class="roulette-content">
    <div onclick="closeRoulette()" style="position:absolute; right:15px; top:10px; cursor:pointer;">✖</div>
    <h3 id="modalTitle" style="text-align:center; margin-top:0;">Case</h3>
    <div class="roulette-window">
      <div class="pointer"></div>
      <div id="rouletteTrack"></div>
    </div>
    <button id="openBtn">OPEN (15 ⭐)</button>
    <div id="skinsList"></div>
  </div>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  const openSound = new Audio('case_open.mp3');
  const volumeSlider = document.getElementById('volumeSlider');

  function updateVolume() {
    let vol = volumeSlider.value / 100;
    openSound.volume = vol;
    openSound.muted = (vol === 0);
  }

  volumeSlider.addEventListener('input', updateVolume);

  let stars = parseInt(localStorage.getItem("stars") || "0");
  document.getElementById("balance").innerText = stars;

  const user = tg.initDataUnsafe.user;
  if (user) {
    document.getElementById("name").innerText = user.first_name;
    if (user.photo_url) document.getElementById("avatar").src = user.photo_url;
  }

  const glockSkins = [
    { name: "Wasteland Rebel", rarity: "red", weight: 1 },
    { name: "Bullet Queen", rarity: "red", weight: 1 },
    { name: "Neo-Noir", rarity: "red", weight: 1 },
    { name: "Gold Toof", rarity: "red", weight: 1 },
    { name: "AXIA", rarity: "pink", weight: 3 },
    { name: "Water Elemental", rarity: "pink", weight: 3 },
    { name: "Snack Attack", rarity: "pink", weight: 3 },
    { name: "Vogue", rarity: "pink", weight: 3 },
    { name: "Nuclear Garden", rarity: "purple", weight: 6 },
    { name: "Franklin", rarity: "purple", weight: 6 },
    { name: "Brass", rarity: "purple", weight: 6 },
    { name: "Steel Disruption", rarity: "purple", weight: 6 },
    { name: "Royal Legion", rarity: "purple", weight: 6 },
    { name: "Grinder", rarity: "purple", weight: 6 },
    { name: "Moonrise", rarity: "purple", weight: 6 },
    { name: "Weasel", rarity: "purple", weight: 6 },
    { name: "Death Rattle", rarity: "blue", weight: 15 },
    { name: "High Beam", rarity: "blue", weight: 15 },
    { name: "Night", rarity: "blue", weight: 15 },
    { name: "Sand Dune", rarity: "blue", weight: 15 },
    { name: "Groundwater", rarity: "blue", weight: 15 },
    { name: "Oxide Blaze", rarity: "gray", weight: 30 },
    { name: "Sacrifice", rarity: "gray", weight: 30 },
    { name: "Clear Polymer", rarity: "gray", weight: 30 },
    { name: "Warhawk", rarity: "gray", weight: 30 },
    { name: "Catacombs", rarity: "gray", weight: 30 },
    { name: "Wraiths", rarity: "gray", weight: 30 },
    { name: "Off World", rarity: "gray", weight: 30 },
    { name: "Ironwork", rarity: "gray", weight: 30 },
    { name: "Bunset Burner", rarity: "gray", weight: 30 },
    { name: "Blue Fissure", rarity: "gray", weight: 30 },
    { name: "Candy Apple", rarity: "gray", weight: 30 },
    { name: "Reactor", rarity: "gray", weight: 30 }
  ];

  const uspSkins = [
    { name: "Neo-Noir", rarity: "red", weight: 1 },
    { name: "Kill Confirmed", rarity: "red", weight: 1 },
    { name: "The Traitor", rarity: "red", weight: 1 },
    { name: "Orion", rarity: "pink", weight: 4 },
    { name: "Cortex", rarity: "pink", weight: 4 },
    { name: "Monster Mashup", rarity: "pink", weight: 4 },
    { name: "Overgrowth", rarity: "purple", weight: 10 },
    { name: "Orange Anolis", rarity: "purple", weight: 10 },
    { name: "Ticket to Hell", rarity: "purple", weight: 10 },
    { name: "Flashback", rarity: "purple", weight: 10 },
    { name: "Ancient Visions", rarity: "purple", weight: 10 },
    { name: "Guardian", rarity: "purple", weight: 10 },
    { name: "Cyrex", rarity: "purple", weight: 10 },
    { name: "Road Rash", rarity: "purple", weight: 10 },
    { name: "Forest Leaves", rarity: "blue", weight: 25 },
    { name: "Pathfinder", rarity: "blue", weight: 25 },
    { name: "Royal Blue", rarity: "blue", weight: 25 },
    { name: "Para Green", rarity: "blue", weight: 25 },
    { name: "Purple DDPAT", rarity: "gray", weight: 50 },
    { name: "Night Ops", rarity: "gray", weight: 50 },
    { name: "Business Class", rarity: "gray", weight: 50 },
    { name: "Blood Tiger", rarity: "gray", weight: 50 },
    { name: "Black Lotus", rarity: "gray", weight: 50 },
    { name: "Check Engine", rarity: "gray", weight: 50 },
    { name: "Torque", rarity: "gray", weight: 50 },
    { name: "Lead Conduit", rarity: "gray", weight: 50 }
  ];

  let isSpinning = false;

  function toggleMenu() {
    const menu = document.getElementById("menu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
  }

  function openPromo() { document.getElementById("promoModal").style.display = "block"; }
  function closePromo() { document.getElementById("promoModal").style.display = "none"; }

  function applyPromo() {
    let input = document.getElementById("promoInput").value.trim();
    if (input === "+") {
      stars += 100;
      localStorage.setItem("stars", stars);
      document.getElementById("balance").innerText = stars;
      alert("🎉 +100 ⭐");
      closePromo();
    } else { alert("❌ Error"); }
  }

  function getSkinFile(name, type) {
    if (type === 'glock') {
      if (name === "Moonrise") return "glock18_m.png";
      if (name === "Neo-Noir") return "glock18_neo.png";
      return "glock18_" + name.toLowerCase().replace(/ /g, "_") + ".png";
    } else {
      let firstWord = name.split(' ')[0].toLowerCase();
      if (name === "Neo-Noir") return "usp_neo.png";
      return "usp_" + firstWord + ".png";
    }
  }

  function startRoulette(type) {
    if (isSpinning) return;
    const modal = document.getElementById("rouletteModal");
    const track = document.getElementById("rouletteTrack");
    const list = document.getElementById("skinsList");
    const skins = type === 'glock' ? glockSkins : uspSkins;

    document.getElementById("modalTitle").innerText = type === 'glock' ? "Glock-18 Case" : "USP-S Case";
    modal.style.display = "flex";
    
    track.style.transition = "none";
    track.style.transform = "translateX(0)";
    track.innerHTML = "";
    list.innerHTML = "";

    for(let i=0; i<45; i++) {
      const rnd = skins[Math.floor(Math.random() * skins.length)];
      track.innerHTML += `<div class="roulette-item"><img src="${getSkinFile(rnd.name, type)}"></div>`;
    }
    skins.forEach(s => { list.innerHTML += `<img src="${getSkinFile(s.name, type)}">`; });
    document.getElementById("openBtn").onclick = () => spinRoulette(type);
  }

  function spinRoulette(type) {
    if (isSpinning || stars < 15) return;

    updateVolume();
    openSound.currentTime = 0;
    openSound.play().catch(e => console.log("Sound error"));

    stars -= 15;
    localStorage.setItem("stars", stars);
    document.getElementById("balance").innerText = stars;
    isSpinning = true;

    const skins = type === 'glock' ? glockSkins : uspSkins;
    const totalWeight = skins.reduce((s, i) => s + i.weight, 0);
    let rnd = Math.random() * totalWeight;
    let winner = skins[skins.length - 1];
    for (let s of skins) { if (rnd < s.weight) { winner = s; break; } rnd -= s.weight; }

    const track = document.getElementById("rouletteTrack");
    const winPos = 35; 
    track.querySelectorAll('.roulette-item')[winPos].innerHTML = `<img src="${getSkinFile(winner.name, type)}">`;
    
    const windowWidth = document.querySelector('.roulette-window').offsetWidth;
    const offset = (winPos * 90) - (windowWidth / 2) + 45;

    track.style.transition = "transform 8s cubic-bezier(0.15, 0, 0.15, 1)";
    track.style.transform = `translateX(-${offset}px)`;

    setTimeout(() => {
      let inv = JSON.parse(localStorage.getItem("items") || "[]");
      
      let skinPrice = 5; 
      if (winner.rarity === "red") skinPrice = 100;
      else if (winner.rarity === "pink") skinPrice = 70;
      else if (winner.rarity === "purple") skinPrice = 30;
      else if (winner.rarity === "blue") skinPrice = 15;

      inv.push({ 
        name: (type==='glock'?'Glock-18 ':'USP-S ')+winner.name, 
        price: skinPrice, 
        img: getSkinFile(winner.name, type) 
      });
      
      localStorage.setItem("items", JSON.stringify(inv));
      
      alert(`🎉 Вітаємо! Вам випав: ${winner.name} (${skinPrice} ⭐)`);
      
      isSpinning = false;
      track.style.transition = "none";
      track.style.transform = "translateX(0)";
    }, 8500);
  }

  function closeRoulette() { if (!isSpinning) document.getElementById("rouletteModal").style.display = "none"; }
  function openCase(p) { if (stars >= p) { stars -= p; localStorage.setItem("stars", stars); document.getElementById("balance").innerText = stars; alert("🎉 Won!"); } else { alert("Need stars"); } }

  document.addEventListener("click", (e) => {
    if (!e.target.closest(".profile") && !e.target.closest(".menu")) document.getElementById("menu").style.display = "none";
  });
</script>
</body>
</html>
