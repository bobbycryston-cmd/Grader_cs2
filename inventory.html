<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <title>Inventory - Grader_cs2</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1a1735, #090816 80%);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Шапка як в index.html */
    .header {
      display: flex;
      justify-content: flex-end;
      padding: 12px;
      position: relative;
    }

    .header-box {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.08);
      padding: 8px 12px;
      border-radius: 14px;
    }

    .balance-box {
      display: flex;
      align-items: center;
      gap: 5px;
      font-weight: bold;
      font-size: 16px;
    }
    .balance-box span { color: #f1c40f; }

    .header-btn {
      background: #ff9f43;
      border: none;
      color: black;
      font-size: 18px;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #333;
      border: 1px solid rgba(255,255,255,0.2);
    }

    /* Меню */
    .menu {
      position: absolute;
      top: 70px;
      right: 12px;
      background: rgba(15, 12, 33, 0.98);
      padding: 12px;
      border-radius: 12px;
      width: 180px;
      display: none;
      z-index: 2000;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .menu button {
      width: 100%;
      margin-top: 8px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: black;
      background: #fff;
      font-weight: bold;
      transition: 0.2s;
    }

    /* Стилі інвентарю */
    .inv-title { text-align: center; font-size: 24px; font-weight: bold; margin: 20px 0 10px; }
    
    .nav-controls {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .btn-control {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-sell-all { background: #ff9f43; color: black; }
    .btn-back { background: rgba(255,255,255,0.1); color: white; }

    #list {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 0 15px 15px;
      max-width: 500px;
      margin: 0 auto;
    }

    .item {
      background: rgba(255,255,255,0.03);
      border-radius: 15px;
      padding: 10px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .item img { width: 100%; height: 60px; object-fit: contain; margin-bottom: 8px; }
    .item-name { font-size: 10px; font-weight: bold; height: 24px; overflow: hidden; margin-bottom: 5px; }
    .item-price { color: #f1c40f; font-size: 11px; margin-bottom: 8px; }
    
    .btn-item-sell {
      width: 100%;
      padding: 7px;
      background: #ff4757;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 10px;
      font-weight: bold;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-box">
    <div class="balance-box"><span id="balance">0</span> ⭐</div>
    <button class="header-btn" onclick="alert('Soon')">+</button>
    <button class="header-btn" onclick="alert('Promo Soon')">🎟</button>
    <div class="profile" onclick="toggleMenu()">
      <img id="avatar" class="avatar">
      <div id="name">User</div>
    </div>
  </div>

  <div class="menu" id="menu">
    <button onclick="window.location.href='index.html'">🏠 Головна</button>
    <button onclick="window.location.href='upgrade.html'">⚡ Upgrade</button>
  </div>
</div>

<div class="inv-title">Inventory</div>
<div class="nav-controls">
  <button class="btn-control btn-sell-all" onclick="sellAll()">💰 Sell All</button>
  <button class="btn-control btn-back" onclick="window.location.href='index.html'">⬅ Back</button>
</div>

<div id="list"></div>

<script>
  const tg = window.Telegram.WebApp;
  
  function toggleMenu() {
    const m = document.getElementById("menu");
    m.style.display = m.style.display === "block" ? "none" : "block";
  }

  const user = tg.initDataUnsafe.user;
  if (user) {
    document.getElementById("name").innerText = user.first_name;
    if (user.photo_url) document.getElementById("avatar").src = user.photo_url;
  }

  function loadItems() {
    let items = JSON.parse(localStorage.getItem("items") || "[]");
    document.getElementById("balance").innerText = localStorage.getItem("stars") || "0";
    let html = "";

    if (items.length === 0) {
      document.getElementById("list").innerHTML = "<div style='grid-column:1/-1; opacity:0.5; margin-top:50px; text-align:center;'>Тут поки що порожньо...</div>";
      return;
    }

    items.forEach((item, i) => {
      html += `
        <div class="item">
          <img src="${item.img || ''}">
          <div class="item-name">${item.name}</div>
          <div class="item-price">${item.price || 5} ⭐</div>
          <button class="btn-item-sell" onclick="sell(${i})">Sell</button>
        </div>`;
    });
    document.getElementById("list").innerHTML = html;
  }

  function sell(i) {
    let items = JSON.parse(localStorage.getItem("items") || "[]");
    let stars = parseInt(localStorage.getItem("stars") || "0") + (items[i].price || 5);
    localStorage.setItem("stars", stars);
    items.splice(i, 1);
    localStorage.setItem("items", JSON.stringify(items));
    loadItems();
  }

  function sellAll() {
    let items = JSON.parse(localStorage.getItem("items") || "[]");
    if (!items.length) return;
    let total = items.reduce((s, item) => s + (item.price || 5), 0);
    localStorage.setItem("stars", parseInt(localStorage.getItem("stars") || "0") + total);
    localStorage.setItem("items", "[]");
    loadItems();
  }

  document.addEventListener("click", (e) => {
    if (!e.target.closest(".profile") && !e.target.closest(".menu")) {
      document.getElementById("menu").style.display = "none";
    }
  });

  loadItems();
</script>
</body>
</html>
