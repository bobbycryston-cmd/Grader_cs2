<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <title>Grader_cs2</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #1a1735, #090816 80%);
      color: white;
    }

    .header {
      display: flex;
      justify-content: flex-end;
      padding: 12px;
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.1);
      padding: 8px 10px;
      border-radius: 12px;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }

    /* CASE GRID */
    .case-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 25px;
      padding: 30px;
      text-align: center;
    }

    .case {
      cursor: pointer;
      transition: 0.25s;
    }

    .case:hover {
      transform: scale(1.08);
    }

    .case img {
      width: 100%;
      max-width: 140px;
      height: auto;
      display: block;
      margin: 0 auto;
    }

    .title {
      margin-top: 10px;
      font-size: 18px;
      font-weight: bold;
    }

    .price {
      color: gold;
      margin-top: 5px;
      font-size: 16px;
    }
  </style>
</head>

<body>

<div class="header">
  <div class="profile">
    <img id="avatar" class="avatar">
    <div id="name">User</div>
  </div>
</div>

<div class="case-grid">

  <div class="case" onclick="openCase(1)">
    <img src="bronze.png">
    <div class="title">Bronze</div>
    <div class="price">1 ⭐</div>
  </div>

  <div class="case" onclick="openCase(3)">
    <img src="silver.png">
    <div class="title">Silver</div>
    <div class="price">3 ⭐</div>
  </div>

  <div class="case" onclick="openCase(5)">
    <img src="gold.png">
    <div class="title">Gold</div>
    <div class="price">5 ⭐</div>
  </div>

</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  const user = tg.initDataUnsafe.user;

  if (user) {
    document.getElementById("name").innerText = user.first_name;
    if (user.photo_url) document.getElementById("avatar").src = user.photo_url;
  }

  function openCase(price) {
    alert("Відкриття кейса за " + price + " ⭐");
  }
</script>

</body>
</html>
