<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <title>Inventory - Grader_cs2</title>

  <style>
    body {
      margin: 0; font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(circle at top, #1a1735, #090816 80%);
      color: white; min-height: 100vh; overflow-x: hidden;
    }

    .header { width: 100%; display: flex; justify-content: flex-end; padding: 12px; box-sizing: border-box; position: relative; }
    .header-box { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.08); padding: 8px 12px; border-radius: 14px; position: relative; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; background: #333; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }

    .menu {
      position: absolute; top: 60px; right: 0; background: #1a1631;
      padding: 10px; border-radius: 12px; width: 150px; display: none; z-index: 1000;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
    }
    .menu button {
      width: 100%; margin-top: 5px; padding: 10px; border: none;
      border-radius: 8px; cursor: pointer; color: black; background: white; font-weight: bold;
    }

    .inv-title { text-align: center; font-size: 24px; font-weight: bold; margin: 20px 0 10px; text-transform: uppercase; letter-spacing: 1px; }
    
    .nav-controls { display: flex; justify-content: center; gap: 12px; margin-bottom: 25px; }
    .btn-control { padding: 12px 24px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 12px; }
    .btn-sell-all { background: #ff9f43; color: black; }
    .btn-back { background: rgba(255,255,255,0.1); color: white; }

    #list { 
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; 
      padding: 0 15px 15px; max-width: 500px; margin: 0 auto; 
    }
    
    .item { 
      background: rgba(255,255,255,0.03); border-radius: 15px; padding: 12px; 
      text-align: center; border: 1px solid rgba(255,255,255,0.08); transition: 0.2s;
    }
    .item img { width: 100%; height: 60px; object-fit: contain; margin-bottom: 8px; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); }
    .item-name { font-size: 10px; font-weight: bold; height: 24px; overflow: hidden; margin-bottom: 5px; color: #ccc; }
    .item-price { color: #f1c40f; font-size: 11px; margin-bottom: 10px; font-weight: bold; }
    .btn-item-sell { 
      width: 100%; padding: 8px; background: #ff4757; color: white; 
      border: none; border-radius: 8px; font-size: 10px; font-weight: bold; cursor: pointer; 
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-box">
    <div style="font-weight:bold;"><span id="balance" style="color:#f1c40f;">0</span> ⭐</div>
    <img id="avatar" class="avatar" onclick="toggleMenu()">
    <div class="menu" id="menu">
      <button onclick="location.href='index.html'">🏠 Home</button>
      <button onclick="location.href='upgrade.html'">⚡ Upgrade</button>
    </div>
  </div>
</div>

<div class="inv-title">Inventory</div>

<div class="nav-controls">
  <button class="btn-control btn-sell-all" onclick="sellAll()">Sell All</button>
  <button class="btn-control btn-back" onclick="location.href='index.html'">Back</button>
</div>

<div id="list"></div>

<script>
  function toggleMenu() {
    const m = document.getElementById("menu");
    m.style.display = m.style.display === "block" ? "none" : "block";
  }

  function loadItems() {
    let items = JSON.parse(localStorage.getItem("items") || "[]");
    document.getElementById("balance").innerText = localStorage.getItem("stars") || "0";
    
    const user = window.Telegram.WebApp.initDataUnsafe.user;
    if(user && user.photo_url) document.getElementById("avatar").src = user.photo_url;

    let html = "";
    if (items.length === 0) {
      document.getElementById("list").innerHTML = "<div style='grid-column:1/-1; opacity:0.3; margin-top:50px; text-align:center;'>Your inventory is empty</div>";
      return;
    }

    items.forEach((item, i) => {
      html += `
        <div class="item">
          <img src="${item.img || ''}">
          <div class="item-name">${item.name}</div>
          <div class="item-price">${item.price || 5} ⭐</div>
          <button class="btn-item-sell" onclick="sell(${i})">Sell</button>
        </div>`;
    });
    document.getElementById("list").innerHTML = html;
  }

  function sell(i) {
    let items = JSON.parse(localStorage.getItem("items") || "[]");
    let stars = parseInt(localStorage.getItem("stars") || "0") + (items[i].price || 5);
    localStorage.setItem("stars", stars);
    items.splice(i, 1);
    localStorage.setItem("items", JSON.stringify(items));
    loadItems();
  }

  function sellAll() {
    let items = JSON.parse(localStorage.getItem("items") || "[]");
    if (!items.length) return;
    let total = items.reduce((s, item) => s + (item.price || 5), 0);
    localStorage.setItem("stars", parseInt(localStorage.getItem("stars") || "0") + total);
    localStorage.setItem("items", "[]");
    loadItems();
  }

  document.addEventListener("click", (e) => {
    if (!e.target.closest(".header-box")) document.getElementById("menu").style.display = "none";
  });

  loadItems();
</script>
</body>
</html>
