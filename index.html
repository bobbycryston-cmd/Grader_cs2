<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <title>Grader_cs2</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #1a1735, #090816 80%);
      color: white;
    }

    .header {
      display: flex;
      justify-content: flex-end;
      padding: 12px;
      position: relative;
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.1);
      padding: 8px 12px;
      border-radius: 12px;
      cursor: pointer;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }

    .menu {
      position: absolute;
      top: 60px;
      right: 12px;
      background: rgba(0,0,0,0.9);
      padding: 12px;
      border-radius: 12px;
      width: 200px;
      display: none;
    }

    .menu button {
      width: 100%;
      margin-top: 8px;
      padding: 8px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .stars {
      margin-top: 10px;
      color: gold;
    }

    /* GRID */
    .case-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      padding: 25px;
      text-align: center;
    }

    .case {
      cursor: pointer;
      transition: 0.25s;
    }

    .case:hover {
      transform: scale(1.05);
    }

    /* 🔥 ОСНОВНЕ ВИПРАВЛЕННЯ */
    .case-img-box {
      width: 100%;
      height: 150px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 16px;
      padding: 12px; /* рівні відступи */
      background: rgba(255,255,255,0.03);
    }

    .case-img-box img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* ВАЖЛИВО: не обрізає */
      object-position: center;
    }

    /* 🔥 РАМКИ (акуратніші) */
    .case:nth-child(1) .case-img-box {
      border: 2px solid #cd7f32;
      box-shadow: 0 0 12px #cd7f32;
    }

    .case:nth-child(2) .case-img-box {
      border: 2px solid #c0c0c0;
      box-shadow: 0 0 12px #c0c0c0;
    }

    .case:nth-child(3) .case-img-box {
      border: 2px solid gold;
      box-shadow: 0 0 12px gold;
    }

    .title {
      margin-top: 12px;
      font-size: 18px;
      font-weight: bold;
    }

    .price {
      color: gold;
      margin-top: 5px;
      font-size: 16px;
    }
  </style>
</head>

<body>

<div class="header">

  <div class="profile" onclick="toggleMenu()">
    <img id="avatar" class="avatar">
    <div id="name">User</div>
  </div>

  <div class="menu" id="menu">
    <div>🔊 Гучність</div>
    <input type="range" min="0" max="100" value="50" style="width:100%">

    <div class="stars">
      ⭐ Баланс: <span id="balance">0</span>
    </div>

    <button onclick="addStars()">➕ Додати зірки</button>
    <button onclick="openInventory()">🎒 Inventory</button>
  </div>

</div>

<div class="case-grid">

  <div class="case" onclick="openCase(1)">
    <div class="case-img-box">
      <img src="bronze.png">
    </div>
    <div class="title">Bronze</div>
    <div class="price">1 ⭐</div>
  </div>

  <div class="case" onclick="openCase(3)">
    <div class="case-img-box">
      <img src="silver.png">
    </div>
    <div class="title">Silver</div>
    <div class="price">3 ⭐</div>
  </div>

  <div class="case" onclick="openCase(5)">
    <div class="case-img-box">
      <img src="gold.png">
    </div>
    <div class="title">Gold</div>
    <div class="price">5 ⭐</div>
  </div>

</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  let stars = parseInt(localStorage.getItem("stars") || "0");
  document.getElementById("balance").innerText = stars;

  const user = tg.initDataUnsafe.user;

  if (user) {
    document.getElementById("name").innerText = user.first_name;
    if (user.photo_url) document.getElementById("avatar").src = user.photo_url;
  }

  function toggleMenu() {
    const menu = document.getElementById("menu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
  }

  function addStars() {
    stars += 10;
    localStorage.setItem("stars", stars);
    document.getElementById("balance").innerText = stars;
  }

  function openInventory() {
    window.location.href = "inventory.html";
  }

  function openCase(price) {
    if (stars < price) {
      alert("Недостатньо ⭐");
      return;
    }

    stars -= price;
    localStorage.setItem("stars", stars);
    document.getElementById("balance").innerText = stars;

    alert("Відкриття кейса...");
  }

  document.addEventListener("click", function(e) {
    if (!e.target.closest(".profile")) {
      document.getElementById("menu").style.display = "none";
    }
  });
</script>

</body>
</html>
