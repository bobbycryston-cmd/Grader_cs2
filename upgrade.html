<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #0f0c21; color: white; display: flex; flex-direction: column; align-items: center; min-height: 100vh; overflow-x: hidden; }
    
    /* Header & Menu */
    .header { width: 100%; display: flex; justify-content: flex-end; padding: 12px; box-sizing: border-box; }
    .header-box { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.08); padding: 8px 12px; border-radius: 14px; position: relative; cursor: pointer; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; background: #333; border: 1px solid rgba(255,255,255,0.2); }
    .menu { position: absolute; top: 60px; right: 0; background: #1a1631; padding: 10px; border-radius: 12px; width: 160px; display: none; z-index: 1000; border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    .menu button { width: 100%; margin-top: 8px; padding: 10px; border: none; border-radius: 8px; cursor: pointer; background: white; color: black; font-weight: bold; }

    /* UI Layout */
    .main-ui { display: flex; justify-content: space-around; align-items: center; width: 100%; max-width: 500px; margin-top: 10px; }
    .side-panel { width: 130px; height: 160px; background: rgba(255,255,255,0.03); border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; text-align: center; font-size: 11px; border: 1px solid rgba(255,255,255,0.05); }
    .side-panel img { width: 80px; height: 50px; object-fit: contain; margin-bottom: 5px; }
    .reset-btn { position: absolute; top: 5px; right: 5px; background: rgba(255,255,255,0.1); border: none; color: white; border-radius: 50%; width: 22px; height: 22px; cursor: pointer; display: none; z-index: 5; }

    /* Wheel */
    .wheel-box { position: relative; width: 200px; height: 200px; }
    #wheelCanvas { width: 100%; height: 100%; }
    .chance-display { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 26px; font-weight: bold; color: white; text-shadow: 0 0 10px rgba(0,0,0,0.5); }

    /* Buttons */
    .controls { display: flex; gap: 8px; margin: 15px; }
    .btn-q { background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .btn-upg { width: 85%; max-width: 320px; padding: 16px; background: linear-gradient(135deg, #ff9f43, #ff6b6b); border: none; border-radius: 14px; font-weight: bold; font-size: 18px; cursor: pointer; color: black; box-shadow: 0 4px 15px rgba(255,159,67,0.3); }
    .btn-upg:disabled { opacity: 0.2; cursor: default; }

    /* Inventory Scroll */
    .inv-scroll { width: 100%; display: flex; overflow-x: auto; gap: 10px; padding: 20px; box-sizing: border-box; }
    .skin-item { min-width: 100px; background: rgba(255,255,255,0.04); padding: 12px; border-radius: 12px; text-align: center; cursor: pointer; border: 2px solid transparent; transition: 0.2s; }
    .skin-item.selected { border-color: #ff9f43; background: rgba(255,159,67,0.1); }
    .skin-item img { width: 70px; height: 45px; object-fit: contain; }
    .skin-item div { font-size: 12px; margin-top: 5px; color: #f1c40f; font-weight: bold; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-box" onclick="toggleMenu()">
    <div style="font-weight:bold;"><span id="balance" style="color:#f1c40f;">0</span> ⭐</div>
    <img id="avatar" class="avatar" src="">
    <div class="menu" id="menu">
      <button onclick="window.location.href='index.html'">🏠 Home</button>
      <button onclick="window.location.href='inventory.html'">🎒 Inventory</button>
    </div>
  </div>
</div>

<div class="main-ui">
  <div class="side-panel" id="panelIn">
    <button class="reset-btn" id="rIn" onclick="resetIn()">×</button>
    <div id="cIn">Select Skin</div>
  </div>
  
  <div class="wheel-box">
    <canvas id="wheelCanvas" width="400" height="400"></canvas>
    <div class="chance-display" id="chText">0%</div>
  </div>

  <div class="side-panel" id="panelOut">
    <button class="reset-btn" id="rOut" onclick="resetOut()">×</button>
    <div id="cOut">Target Skin</div>
  </div>
</div>

<div class="controls">
  <button class="btn-q" onclick="quick(2)">X2</button>
  <button class="btn-q" onclick="quick(5)">X5</button>
  <button class="btn-q" onclick="quick(10)">X10</button>
</div>

<button class="btn-upg" id="uBtn" disabled onclick="start()">UPGRADE</button>

<div class="inv-scroll" id="userInv"></div>

<script>
  const tg = window.Telegram.WebApp;
  let items = JSON.parse(localStorage.getItem("items") || "[]");
  let selIn = null, selOut = null, isSpinning = false;

  // Твої скіни з index.html
  const targets = [
    { name: "Glock | High Beam", price: 15, img: "glock18_high_beam.png" },
    { name: "Glock | Water Elemental", price: 40, img: "glock18_water_elemental.png" },
    { name: "USP | Cortex", price: 40, img: "usp_cortex.png" },
    { name: "Glock | Neo-Noir", price: 100, img: "glock18_neo.png" },
    { name: "USP | Neo-Noir", price: 100, img: "usp_neo.png" },
    { name: "USP | Kill Confirmed", price: 100, img: "usp_kill.png" }
  ];

  function toggleMenu() {
    const m = document.getElementById("menu");
    m.style.display = (m.style.display === "block") ? "none" : "block";
  }

  function draw(chance, angle = Math.PI/2) {
    const canvas = document.getElementById("wheelCanvas");
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0,0,400,400);
    const cx = 200, cy = 200, r = 160;

    // Фон (чорний сектор)
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.strokeStyle = "#16122d"; ctx.lineWidth = 25; ctx.stroke();

    // Оранжевий сектор (Успіх)
    if(chance > 0) {
      let arc = Math.PI * 2 * chance;
      ctx.beginPath();
      ctx.arc(cx, cy, r, (Math.PI/2) - (arc/2), (Math.PI/2) + (arc/2));
      ctx.strokeStyle = "#ff9f43"; ctx.lineWidth = 25; ctx.stroke();
    }

    // Біла стрілка
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle);
    ctx.beginPath();
    ctx.moveTo(r - 35, -15); ctx.lineTo(r + 15, 0); ctx.lineTo(r - 35, 15);
    ctx.fillStyle = "white"; ctx.fill();
    ctx.restore();
  }

  function selectIn(i) {
    if(isSpinning) return;
    selIn = {...items[i], index: i};
    document.querySelectorAll(".skin-item").forEach(el => el.classList.remove("selected"));
    document.getElementById(`item-${i}`).classList.add("selected");
    document.getElementById("cIn").innerHTML = `<img src="${selIn.img}"><br>${selIn.name}`;
    document.getElementById("rIn").style.display = "block";
    update();
  }

  function resetIn() { selIn = null; document.getElementById("cIn").innerHTML = "Select Skin"; document.getElementById("rIn").style.display = "none"; update(); }
  function resetOut() { selOut = null; document.getElementById("cOut").innerHTML = "Target Skin"; document.getElementById("rOut").style.display = "none"; update(); }

  function quick(m) { if(!selIn) return; pickClosest(selIn.price * m); }
  function pickClosest(goal) {
    selOut = targets.reduce((prev, curr) => Math.abs(curr.price - goal) < Math.abs(prev.price - goal) ? curr : prev);
    document.getElementById("cOut").innerHTML = `<img src="${selOut.img}"><br>${selOut.name}`;
    document.getElementById("rOut").style.display = "block";
    update();
  }

  function update() {
    if(selIn && selOut) {
      let c = Math.min(selIn.price / selOut.price, 0.95);
      document.getElementById("chText").innerText = Math.floor(c*100) + "%";
      draw(c);
      document.getElementById("uBtn").disabled = false;
    } else {
      document.getElementById("chText").innerText = "0%";
      draw(0);
      document.getElementById("uBtn").disabled = true;
    }
  }

  function start() {
    if(isSpinning) return;
    isSpinning = true;
    document.getElementById("uBtn").disabled = true;

    const chance = Math.min(selIn.price / selOut.price, 0.95);
    const win = Math.random() < chance;
    const arc = Math.PI * 2 * chance;
    const spins = 6 + Math.random() * 2;
    
    // Визначаємо фінальний кут так, щоб він збігався з результатом
    let targetAngle = win ? 
      (Math.PI/2) + (Math.random() * arc - arc/2) : 
      (Math.PI/2) + (arc/2) + Math.random() * (Math.PI*2 - arc);

    const finalA = (Math.PI*2*spins) + targetAngle;
    let startT = null;

    function anim(t) {
      if(!startT) startT = t;
      let prog = (t - startT) / 4000;
      if(prog > 1) prog = 1;
      let ease = 1 - Math.pow(1 - prog, 4);
      draw(chance, finalA * ease);
      if(prog < 1) requestAnimationFrame(anim);
      else {
        setTimeout(() => {
          if(win) {
            alert("SUCCESS! Ви отримали " + selOut.name);
            items.push({...selOut});
          } else alert("FAILED!");
          items.splice(selIn.index, 1);
          localStorage.setItem("items", JSON.stringify(items));
          location.reload();
        }, 500);
      }
    }
    requestAnimationFrame(anim);
  }

  // Ініціалізація даних користувача
  document.getElementById("balance").innerText = localStorage.getItem("stars") || 0;
  if(tg.initDataUnsafe.user) {
    if(tg.initDataUnsafe.user.photo_url) document.getElementById("avatar").src = tg.initDataUnsafe.user.photo_url;
  }

  // Завантаження інвентарю
  document.getElementById("userInv").innerHTML = items.map((it, i) => `
    <div class="skin-item" id="item-${i}" onclick="selectIn(${i})">
      <img src="${it.img}">
      <div>${it.price || 5} ⭐</div>
    </div>
  `).join("") || "<div style='opacity:0.5'>Inventory is empty</div>";

  draw(0);
</script>
</body>
</html>
