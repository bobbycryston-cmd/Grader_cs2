<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body { margin: 0; font-family: sans-serif; background: #0f0c21; color: white; display: flex; flex-direction: column; align-items: center; }
    .header { width: 100%; display: flex; justify-content: flex-end; padding: 12px; box-sizing: border-box; }
    .header-box { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.08); padding: 8px 12px; border-radius: 14px; position: relative; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.2); }
    
    .main-ui { display: flex; justify-content: space-around; align-items: center; width: 100%; max-width: 600px; margin-top: 20px; }
    .side-panel { width: 140px; height: 180px; background: rgba(255,255,255,0.02); border-radius: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; text-align: center; font-size: 12px; border: 1px solid rgba(255,255,255,0.1); }
    .side-panel img { width: 90px; height: 60px; object-fit: contain; }
    .reset-btn { position: absolute; top: 5px; right: 5px; background: rgba(255,255,255,0.2); border: none; color: white; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; display: none; }

    .wheel-box { position: relative; width: 220px; height: 220px; }
    #wheelCanvas { width: 100%; height: 100%; }
    .chance-display { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 24px; font-weight: bold; }

    .controls { display: flex; gap: 5px; margin: 20px; flex-wrap: wrap; justify-content: center; }
    .btn-q { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 8px 12px; border-radius: 6px; cursor: pointer; }
    
    .btn-upg { width: 80%; max-width: 300px; padding: 15px; background: linear-gradient(135deg, #ff9f43, #ff6b6b); border: none; border-radius: 12px; font-weight: bold; font-size: 18px; cursor: pointer; color: black; }
    .btn-upg:disabled { opacity: 0.3; }

    .inv-scroll { width: 90%; display: flex; overflow-x: auto; gap: 10px; margin-top: 20px; padding-bottom: 10px; }
    .skin-item { min-width: 90px; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; text-align: center; cursor: pointer; border: 1px solid transparent; }
    .skin-item.selected { border-color: #ff9f43; background: rgba(255,159,67,0.1); }
    .skin-item img { width: 60px; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-box">
    <div style="font-weight:bold;"><span id="balance" style="color:#f1c40f;">0</span> ⭐</div>
    <img id="avatar" class="avatar" src="">
  </div>
</div>

<div class="main-ui">
  <div class="side-panel">
    <button class="reset-btn" id="rIn" onclick="resetIn()">×</button>
    <div id="cIn">Select Skin</div>
  </div>
  
  <div class="wheel-box">
    <canvas id="wheelCanvas" width="400" height="400"></canvas>
    <div class="chance-display" id="chText">0%</div>
  </div>

  <div class="side-panel">
    <button class="reset-btn" id="rOut" onclick="resetOut()">×</button>
    <div id="cOut">Target Skin</div>
  </div>
</div>

<div class="controls">
  <button class="btn-q" onclick="quick(2)">X2</button>
  <button class="btn-q" onclick="quick(5)">X5</button>
  <button class="btn-q" onclick="quickChance(0.5)">50%</button>
</div>

<button class="btn-upg" id="uBtn" disabled onclick="start()">UPGRADE</button>

<div class="inv-scroll" id="userInv"></div>

<script>
  let items = JSON.parse(localStorage.getItem("items") || "[]");
  let selIn = null, selOut = null, isSpinning = false;

  // ТІЛЬКИ ТВОЇ СКІНИ З INDEX
  const targets = [
    { name: "Glock | Water Elemental", price: 40, img: "glock18_water_elemental.png" },
    { name: "USP | Neo-Noir", price: 100, img: "usp_neo.png" },
    { name: "Glock | High Beam", price: 15, img: "glock18_high_beam.png" },
    { name: "USP | Cortex", price: 40, img: "usp_cortex.png" },
    { name: "USP | Kill Confirmed", price: 100, img: "usp_kill.png" }
  ];

  function draw(chance, currentAngle = Math.PI/2) {
    const ctx = document.getElementById("wheelCanvas").getContext("2d");
    ctx.clearRect(0,0,400,400);
    const cx = 200, cy = 200, r = 160;

    // Фон (чорний сектор)
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2);
    ctx.strokeStyle = "#16122d"; ctx.lineWidth = 20; ctx.stroke();

    // Помаранчевий сектор (Успіх) - ЗАВЖДИ внизу по центру
    if(chance > 0) {
      let arcSize = Math.PI * 2 * chance;
      ctx.beginPath();
      ctx.arc(cx, cy, r, (Math.PI/2) - (arcSize/2), (Math.PI/2) + (arcSize/2));
      ctx.strokeStyle = "#ff9f43"; ctx.lineWidth = 20; ctx.stroke();
    }

    // Стрілка
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(currentAngle);
    ctx.beginPath();
    ctx.moveTo(r - 30, -12);
    ctx.lineTo(r + 15, 0);
    ctx.lineTo(r - 30, 12);
    ctx.fillStyle = "white"; ctx.fill();
    ctx.restore();
  }

  function selectIn(i) {
    if(isSpinning) return;
    selIn = {...items[i], index: i};
    document.querySelectorAll(".skin-item").forEach(el => el.classList.remove("selected"));
    document.getElementById(`item-${i}`).classList.add("selected");
    document.getElementById("cIn").innerHTML = `<img src="${selIn.img}"><br>${selIn.price}⭐`;
    document.getElementById("rIn").style.display = "block";
    update();
  }

  function resetIn() { selIn = null; document.getElementById("cIn").innerHTML = "Select Skin"; document.getElementById("rIn").style.display = "none"; update(); }
  function resetOut() { selOut = null; document.getElementById("cOut").innerHTML = "Target Skin"; document.getElementById("rOut").style.display = "none"; update(); }

  function quick(m) { if(!selIn) return; pickClosest(selIn.price * m); }
  function quickChance(c) { if(!selIn) return; pickClosest(selIn.price / c); }

  function pickClosest(goal) {
    selOut = targets.reduce((prev, curr) => Math.abs(curr.price - goal) < Math.abs(prev.price - goal) ? curr : prev);
    document.getElementById("cOut").innerHTML = `<img src="${selOut.img}"><br>${selOut.price}⭐`;
    document.getElementById("rOut").style.display = "block";
    update();
  }

  function update() {
    if(selIn && selOut) {
      let c = Math.min(selIn.price / selOut.price, 0.95);
      document.getElementById("chText").innerText = Math.floor(c*100) + "%";
      draw(c);
      document.getElementById("uBtn").disabled = false;
    } else {
      document.getElementById("chText").innerText = "0%";
      draw(0);
      document.getElementById("uBtn").disabled = true;
    }
  }

  function start() {
    if(isSpinning) return;
    isSpinning = true;
    document.getElementById("uBtn").disabled = true;

    const chance = Math.min(selIn.price / selOut.price, 0.95);
    const win = Math.random() < chance;
    
    const arcSize = Math.PI * 2 * chance;
    const spins = 7 + Math.random() * 2;
    
    // ГЕНЕРУЄМО КУТ ТАК, ЩОБ ВІН ВІДПОВІДАВ СЕКТОРУ
    let targetAngle;
    if (win) {
      // Випадкова точка ВСЕРЕДИНІ помаранчевого сектору (від 90-arc/2 до 90+arc/2)
      targetAngle = (Math.PI / 2) + (Math.random() * arcSize - arcSize / 2);
    } else {
      // Випадкова точка ЗА МЕЖАМИ сектору
      targetAngle = (Math.PI / 2) + (arcSize / 2) + Math.random() * (Math.PI * 2 - arcSize);
    }

    const finalRotation = (Math.PI * 2 * spins) + targetAngle;
    let startTime = null;

    function animate(currentTime) {
      if (!startTime) startTime = currentTime;
      let progress = (currentTime - startTime) / 4000; // 4 секунди крутимо
      if (progress > 1) progress = 1;

      let ease = 1 - Math.pow(1 - progress, 4); // Плавне гальмування
      draw(chance, finalRotation * ease);

      if (progress < 1) {
        requestAnimationFrame(animate);
      } else {
        setTimeout(() => {
          if (win) {
            alert("SUCCESS! Ви отримали " + selOut.name);
            items.push({...selOut});
          } else {
            alert("FAILED!");
          }
          items.splice(selIn.index, 1);
          localStorage.setItem("items", JSON.stringify(items));
          location.reload();
        }, 500);
      }
    }
    requestAnimationFrame(animate);
  }

  // Запуск
  document.getElementById("balance").innerText = localStorage.getItem("stars") || 0;
  document.getElementById("userInv").innerHTML = items.map((it, i) => `
    <div class="skin-item" id="item-${i}" onclick="selectIn(${i})">
      <img src="${it.img}">
      <div>${it.price}⭐</div>
    </div>
  `).join("") || "Empty";
  draw(0);
</script>
</body>
</html>
