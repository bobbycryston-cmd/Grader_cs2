<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <title>Upgrade - Grader_cs2</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1a1735, #090816 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Профіль зверху */
    .header { width: 100%; display: flex; justify-content: flex-end; padding: 12px; box-sizing: border-box; }
    .header-box { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.08); padding: 8px 12px; border-radius: 14px; }
    .avatar { width: 30px; height: 30px; border-radius: 50%; background: #333; }

    /* Кругла рулетка */
    .upgrade-center {
      position: relative;
      width: 220px;
      height: 220px;
      margin: 20px 0;
    }

    canvas {
      width: 100%;
      height: 100%;
      transform: rotate(-90deg); /* Початок зверху */
    }

    .chance-info {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .chance-info span { font-size: 28px; font-weight: bold; color: #ff9f43; }

    /* Слоти для скінів */
    .slots { display: flex; gap: 20px; margin-bottom: 20px; width: 90%; justify-content: center; }
    .slot {
      width: 110px; height: 130px;
      background: rgba(255,255,255,0.05);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 5px;
      font-size: 10px;
      text-align: center;
    }
    .slot img { width: 80px; height: 50px; object-fit: contain; }
    .slot.active { border-color: #ff9f43; }

    /* Горизонтальні списки скінів (без прокрутки вниз) */
    .inventory-section {
      width: 100%;
      padding: 10px;
      background: rgba(0,0,0,0.2);
    }

    .skin-row {
      display: flex;
      overflow-x: auto;
      gap: 10px;
      padding: 10px;
      white-space: nowrap;
      -webkit-overflow-scrolling: touch;
    }

    /* Щоб не було видно скроллбару */
    .skin-row::-webkit-scrollbar { display: none; }

    .skin-card {
      min-width: 80px;
      background: rgba(255,255,255,0.05);
      padding: 8px;
      border-radius: 10px;
      text-align: center;
      border: 1px solid transparent;
    }
    .skin-card.selected { border-color: #ff9f43; background: rgba(255,159,67,0.1); }
    .skin-card img { width: 60px; height: 40px; object-fit: contain; }
    .skin-card div { font-size: 9px; margin-top: 5px; overflow: hidden; text-overflow: ellipsis; }

    .btn-upgrade {
      width: 80%;
      padding: 15px;
      background: #ff9f43;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
      margin: 15px 0;
    }
    .btn-upgrade:disabled { opacity: 0.3; }
    
    h4 { margin: 5px 15px; font-size: 14px; align-self: flex-start; color: #aaa; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-box">
    <div id="balance">0 ⭐</div>
    <img id="avatar" class="avatar">
  </div>
</div>

<div class="upgrade-center">
  <canvas id="wheelCanvas" width="300" height="300"></canvas>
  <div class="chance-info">
    <span id="chanceValue">0%</span>
    <div style="font-size: 10px; color: #aaa;">CHANCE</div>
  </div>
</div>

<div class="slots">
  <div class="slot" id="inputSlot">
    <div id="inText">Select Your Skin</div>
  </div>
  <div class="slot" id="outputSlot">
    <div id="outText">Select Target</div>
  </div>
</div>

<button class="btn-upgrade" id="upgradeBtn" disabled onclick="startUpgrade()">UPGRADE</button>

<h4>Your Inventory</h4>
<div class="inventory-section">
  <div class="skin-row" id="userInventory"></div>
</div>

<h4>Possible Targets</h4>
<div class="inventory-section">
  <div class="skin-row" id="targetInventory"></div>
</div>

<button style="margin: 20px; background: none; border: none; color: white; text-decoration: underline;" onclick="window.location.href='index.html'">⬅ Back</button>

<script>
  let items = JSON.parse(localStorage.getItem("items") || "[]");
  let selectedIn = null;
  let selectedOut = null;
  let isSpinning = false;

  const targetSkins = [
    { name: "Glock Wasteland Rebel", price: 100, img: "glock18_wasteland_rebel.png" },
    { name: "USP-S Kill Confirmed", price: 150, img: "usp_kill.png" },
    { name: "Glock Neo-Noir", price: 70, img: "glock18_neo.png" },
    { name: "USP-S Neo-Noir", price: 60, img: "usp_neo.png" },
    { name: "Glock Water Elemental", price: 40, img: "glock18_water_elemental.png" }
  ];

  function init() {
    document.getElementById("balance").innerText = (localStorage.getItem("stars") || "0") + " ⭐";
    const user = window.Telegram.WebApp.initDataUnsafe.user;
    if (user && user.photo_url) document.getElementById("avatar").src = user.photo_url;
    
    renderUserInv();
    renderTargets();
    drawWheel(0);
  }

  function renderUserInv() {
    const container = document.getElementById("userInventory");
    container.innerHTML = items.length ? "" : "Empty";
    items.forEach((item, i) => {
      container.innerHTML += `
        <div class="skin-card" id="user-${i}" onclick="selectIn(${i})">
          <img src="${item.img}">
          <div>${item.price} ⭐</div>
        </div>`;
    });
  }

  function renderTargets() {
    const container = document.getElementById("targetInventory");
    targetSkins.forEach((item, i) => {
      container.innerHTML += `
        <div class="skin-card" id="target-${i}" onclick="selectOut(${i})">
          <img src="${item.img}">
          <div>${item.price} ⭐</div>
        </div>`;
    });
  }

  function selectIn(i) {
    if(isSpinning) return;
    selectedIn = { ...items[i], index: i };
    document.querySelectorAll('#userInventory .skin-card').forEach(el => el.classList.remove('selected'));
    document.getElementById(`user-${i}`).classList.add('selected');
    document.getElementById("inputSlot").innerHTML = `<img src="${selectedIn.img}"><div>${selectedIn.price} ⭐</div>`;
    updateChance();
  }

  function selectOut(i) {
    if(isSpinning) return;
    selectedOut = targetSkins[i];
    document.querySelectorAll('#targetInventory .skin-card').forEach(el => el.classList.remove('selected'));
    document.getElementById(`target-${i}`).classList.add('selected');
    document.getElementById("outputSlot").innerHTML = `<img src="${selectedOut.img}"><div>${selectedOut.price} ⭐</div>`;
    updateChance();
  }

  function updateChance() {
    if (selectedIn && selectedOut) {
      let chance = (selectedIn.price / selectedOut.price) * 100;
      if (chance > 100) chance = 100;
      document.getElementById("chanceValue").innerText = chance.toFixed(1) + "%";
      drawWheel(chance / 100);
      document.getElementById("upgradeBtn").disabled = false;
    }
  }

  function drawWheel(percent, arrowPos = 0) {
    const canvas = document.getElementById("wheelCanvas");
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0, 0, 300, 300);

    // Фон (сіре коло)
    ctx.beginPath();
    ctx.arc(150, 150, 130, 0, Math.PI * 2);
    ctx.strokeStyle = "#333";
    ctx.lineWidth = 15;
    ctx.stroke();

    // Сектор шансу (оранжевий)
    if (percent > 0) {
      ctx.beginPath();
      ctx.arc(150, 150, 130, 0, Math.PI * 2 * percent);
      ctx.strokeStyle = "#ff9f43";
      ctx.lineWidth = 15;
      ctx.stroke();
    }

    // Стрілка, що бігає
    if (isSpinning) {
      ctx.save();
      ctx.translate(150, 150);
      ctx.rotate(arrowPos);
      ctx.beginPath();
      ctx.moveTo(110, 0);
      ctx.lineTo(145, 0);
      ctx.strokeStyle = "white";
      ctx.lineWidth = 5;
      ctx.stroke();
      ctx.restore();
    }
  }

  function startUpgrade() {
    if (isSpinning) return;
    isSpinning = true;
    document.getElementById("upgradeBtn").disabled = true;

    let chance = (selectedIn.price / selectedOut.price);
    let duration = 3000;
    let start = null;
    let finalRotation = (Math.PI * 2 * 10) + (Math.random() * Math.PI * 2); // 10 обертів + рандом

    function animate(timestamp) {
      if (!start) start = timestamp;
      let progress = timestamp - start;
      let currentRotation = (progress / duration) * finalRotation;

      drawWheel(chance, currentRotation);

      if (progress < duration) {
        requestAnimationFrame(animate);
      } else {
        finishUpgrade(currentRotation % (Math.PI * 2), chance * Math.PI * 2);
      }
    }
    requestAnimationFrame(animate);
  }

  function finishUpgrade(finalPos, winZoneLimit) {
    isSpinning = false;
    
    // Перевіряємо чи потрапила стрілка в зону шансу
    if (finalPos <= winZoneLimit) {
      alert("🔥 SUCCESS! You got " + selectedOut.name);
      items.splice(selectedIn.index, 1);
      items.push(selectedOut);
    } else {
      alert("💀 FAILED! Skin lost.");
      items.splice(selectedIn.index, 1);
    }

    localStorage.setItem("items", JSON.stringify(items));
    location.reload();
  }

  init();
</script>
</body>
</html>
