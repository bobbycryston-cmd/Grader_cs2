<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <title>Grader_cs2</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #1a1735, #090816 80%);
      color: white;
    }

    .header {
      display: flex;
      justify-content: flex-end;
      padding: 12px;
    }

    .header-box {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.08);
      padding: 8px 12px;
      border-radius: 14px;
    }

    .balance-box {
      display: flex;
      align-items: center;
      gap: 5px;
      font-weight: bold;
    }

    .balance-box span {
      color: gold;
    }

    .add-btn {
      background: #ff9f43;
      border: none;
      color: black;
      font-size: 18px;
      width: 34px;
      height: 34px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
    }

    .menu {
      position: absolute;
      top: 70px;
      right: 12px;
      background: rgba(0,0,0,0.9);
      padding: 12px;
      border-radius: 12px;
      width: 200px;
      display: none;
    }

    .menu button {
      width: 100%;
      margin-top: 8px;
      padding: 8px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .case-grid {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .case {
      width: 110px;
      cursor: pointer;
      transition: 0.25s;
    }

    .case:hover {
      transform: scale(1.05);
    }

    .case-box {
      border-radius: 18px;
      padding: 10px;
      text-align: center;
      background: rgba(255,255,255,0.03);
    }

    .case-img-box {
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .case-img-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .case:nth-child(1) .case-box { border: 2px solid #cd7f32; box-shadow: 0 0 10px #cd7f32; }
    .case:nth-child(2) .case-box { border: 2px solid #c0c0c0; box-shadow: 0 0 10px #c0c0c0; }
    .case:nth-child(3) .case-box { border: 2px solid gold; box-shadow: 0 0 10px gold; }
    .case:nth-child(4) .case-box { border: 2px solid #7f8cff; box-shadow: 0 0 10px #7f8cff; }
    .case:nth-child(5) .case-box { border: 2px solid #ff3c6f; box-shadow: 0 0 10px #ff3c6f; }
    .case:nth-child(6) .case-box { border: 2px solid #00eaff; box-shadow: 0 0 10px #00eaff; }

    .title {
      margin-top: 6px;
      font-size: 14px;
      font-weight: bold;
    }

    .price {
      color: gold;
      margin-top: 2px;
      font-size: 13px;
    }

    /* PROMO */

    .promo-modal {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      z-index: 1000;
    }

    .promo-box {
      position: relative;
      background: #111;
      padding: 15px;
      border-radius: 14px;
      width: 300px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    .promo-title {
      text-align: center;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .promo-input-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.05);
      padding: 6px;
      border-radius: 10px;
    }

    .promo-icon {
      font-size: 18px;
    }

    .promo-input-box input {
      flex: 1;
      background: transparent;
      border: none;
      color: white;
      outline: none;
    }

    .promo-btn {
      background: #ff9f43;
      color: black;
      border: none;
      padding: 6px 12px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      flex-shrink: 0;
    }

    .close-btn {
      position: absolute;
      top: 10px;
      right: 15px;
      cursor: pointer;
      font-size: 20px;
      color: white;
    }
  </style>
</head>

<body>

<div class="header">
  <div class="header-box">

    <div class="balance-box">
      <span id="balance">0</span> ⭐
    </div>

    <button class="add-btn" onclick="openTopUp()">+</button>
    <button class="add-btn" onclick="openPromo()">🎟</button>

    <div class="profile" onclick="toggleMenu()">
      <img id="avatar" class="avatar">
      <div id="name">User</div>
    </div>

  </div>

  <div class="menu" id="menu">
    <div>🔊 Гучність</div>
    <input type="range" min="0" max="100" value="50" style="width:100%">
    <button onclick="openInventory()">🎒 Inventory</button>
    <button onclick="openUpgrade()">⚡ Upgrade</button>
  </div>
</div>

<div class="case-grid">
  <div class="case" onclick="openCase(1)">
    <div class="case-box">
      <div class="case-img-box"><img src="bronze.png"></div>
      <div class="title">Bronze</div>
      <div class="price">1 ⭐</div>
    </div>
  </div>

  <div class="case" onclick="openCase(3)">
    <div class="case-box">
      <div class="case-img-box"><img src="silver.png"></div>
      <div class="title">Silver</div>
      <div class="price">3 ⭐</div>
    </div>
  </div>

  <div class="case" onclick="openCase(5)">
    <div class="case-box">
      <div class="case-img-box"><img src="gold.png"></div>
      <div class="title">Gold</div>
      <div class="price">5 ⭐</div>
    </div>
  </div>

  <div class="case" onclick="openCase(10)">
    <div class="case-box">
      <div class="case-img-box"><img src="platinum.png"></div>
      <div class="title">Platinum</div>
      <div class="price">10 ⭐</div>
    </div>
  </div>

  <div class="case" onclick="openCase(25)">
    <div class="case-box">
      <div class="case-img-box"><img src="ruby.png"></div>
      <div class="title">Ruby</div>
      <div class="price">25 ⭐</div>
    </div>
  </div>

  <div class="case" onclick="openCase(50)">
    <div class="case-box">
      <div class="case-img-box"><img src="diamond.png"></div>
      <div class="title">Diamond</div>
      <div class="price">50 ⭐</div>
    </div>
  </div>
</div>

<div class="promo-modal" id="promoModal">
  <div class="promo-box">

    <div class="close-btn" onclick="closePromo()">✖</div>

    <div class="promo-title">Промокод</div>

    <div class="promo-input-box">
      <span class="promo-icon">🎟</span>
      <input type="text" placeholder="Введіть промокод" id="promoInput">
      <button class="promo-btn" onclick="applyPromo()">Застосувати</button>
    </div>

  </div>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  let stars = parseInt(localStorage.getItem("stars") || "0");
  document.getElementById("balance").innerText = stars;

  const user = tg.initDataUnsafe.user;

  if (user) {
    document.getElementById("name").innerText = user.first_name;
    if (user.photo_url) document.getElementById("avatar").src = user.photo_url;
  }

  function openTopUp() {}
  function openUpgrade() {}

  function toggleMenu() {
    const menu = document.getElementById("menu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
  }

  function openInventory() {
    window.location.href = "inventory.html";
  }

  function openCase(price) {
    if (stars < price) {
      alert("Недостатньо ⭐");
      return;
    }

    stars -= price;
    localStorage.setItem("stars", stars);
    document.getElementById("balance").innerText = stars;

    alert("Кейс відкрито ✅");
  }

  function openPromo() {
    document.getElementById("promoModal").style.display = "block";
  }

  function closePromo() {
    document.getElementById("promoModal").style.display = "none";
  }

  const promoCodes = {
    "FREE10": 10,
    "BONUS50": 50,
    "CS2": 5,
    "SLOOBY": 100
  };

  function applyPromo() {
    let code = document.getElementById("promoInput").value.trim().toUpperCase();

    if (!code) {
      alert("Введи промокод");
      return;
    }

    let used = JSON.parse(localStorage.getItem("usedPromo") || "[]");

    if (used.includes(code)) {
      alert("Цей промокод вже використаний ❌");
      return;
    }

    if (promoCodes[code]) {
      stars += promoCodes[code];
      localStorage.setItem("stars", stars);
      document.getElementById("balance").innerText = stars;

      used.push(code);
      localStorage.setItem("usedPromo", JSON.stringify(used));

      alert("Промокод активовано ✅ +" + promoCodes[code] + " ⭐");
      closePromo();
    } else {
      alert("Невірний промокод ❌");
    }
  }

  document.addEventListener("click", function(e) {
    if (!e.target.closest(".profile")) {
      document.getElementById("menu").style.display = "none";
    }
  });
</script>

</body>
</html>
