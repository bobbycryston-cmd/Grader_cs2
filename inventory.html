<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #1a1a2e;
      color: white;
    }

    .top {
      padding: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .buttons {
      display: flex;
      gap: 10px;
    }

    .item {
      background: rgba(255,255,255,0.1);
      margin: 10px;
      padding: 15px;
      border-radius: 10px;
    }

    button {
      margin-top: 5px;
      padding: 5px 10px;
      cursor: pointer;
      border: none;
      border-radius: 6px;
    }
  </style>
</head>

<body>

<div class="top">
  <h3>🎒 Inventory</h3>

  <div class="buttons">
    <button onclick="sellAll()">💰 Sell All</button>
    <button onclick="back()">⬅ Back</button>
  </div>
</div>

<div id="list"></div>

<script>
  function loadItems() {
    let items = JSON.parse(localStorage.getItem("items") || "[]");
    let html = "";

    items.forEach((item, i) => {
      html += `
        <div class="item">
          🎁 ${item.name}
          <br>
          💰 ${item.price || 1} ⭐
          <br>
          <button onclick="sell(${i})">Sell</button>
          <button onclick="withdraw(${i})">Withdraw</button>
        </div>
      `;
    });

    document.getElementById("list").innerHTML = html;
  }

  function sell(i) {
    let items = JSON.parse(localStorage.getItem("items") || "[]");

    let stars = parseInt(localStorage.getItem("stars") || "0");
    stars += items[i].price || 1;

    localStorage.setItem("stars", stars);

    items.splice(i, 1);
    localStorage.setItem("items", JSON.stringify(items));

    loadItems();
  }

  function sellAll() {
    let items = JSON.parse(localStorage.getItem("items") || "[]");

    if (items.length === 0) {
      alert("Інвентар пустий");
      return;
    }

    let total = 0;

    items.forEach(item => {
      total += item.price || 1;
    });

    let stars = parseInt(localStorage.getItem("stars") || "0");
    stars += total;

    localStorage.setItem("stars", stars);
    localStorage.setItem("items", JSON.stringify([]));

    alert("Продано все за " + total + " ⭐");

    loadItems();
  }

  function withdraw(i) {
    alert("Withdraw coming soon ⭐");
  }

  function back() {
    window.location.href = "index.html";
  }

  loadItems();
</script>

</body>
</html>
