<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <title>Inventory - Grader_cs2</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1a1735, #090816 80%);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Верхня панель (Header) */
    .header {
      display: flex;
      justify-content: flex-end;
      padding: 12px; 
      box-sizing: border-box;
    }

    .header-box {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.08);
      padding: 8px 12px;
      border-radius: 14px;
    }

    .balance-box {
      display: flex;
      align-items: center;
      gap: 5px;
      font-weight: bold;
    }

    .balance-box span { color: gold; }

    .profile {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #333;
    }

    /* Заголовок та кнопки керування */
    .inv-header {
      text-align: center;
      margin: 10px 0;
    }

    .inv-title {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .nav-controls {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 20px;
    }

    .btn-control {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .btn-sell-all { background: #ff9f43; color: black; }
    .btn-back { background: rgba(255,255,255,0.1); color: white; }

    /* Сітка інвентарю */
    #list {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 15px;
      max-width: 500px;
      margin: 0 auto;
    }

    .item {
      background: rgba(255,255,255,0.03);
      border-radius: 15px;
      padding: 10px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.2s;
    }

    .item:active { transform: scale(0.95); }

    .item img {
      width: 100%;
      height: 60px;
      object-fit: contain;
      margin-bottom: 8px;
      filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3));
    }

    .item-name {
      font-size: 10px;
      font-weight: bold;
      height: 24px;
      overflow: hidden;
      margin-bottom: 5px;
      line-height: 1.2;
    }

    .item-price {
      color: gold;
      font-size: 11px;
      margin-bottom: 8px;
    }

    .btn-item-sell {
      width: 100%;
      padding: 7px;
      background: #ff4757;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 10px;
      font-weight: bold;
      cursor: pointer;
    }

    .empty-msg {
      grid-column: 1 / -1;
      text-align: center;
      opacity: 0.4;
      margin-top: 60px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div class="header">
  <div class="header-box">
    <div class="balance-box">
      <span id="balance">0</span> ⭐
    </div>
    <div class="profile">
      <img id="avatar" class="avatar" src="">
      <div id="name">User</div>
    </div>
  </div>
</div>

<div class="inv-header">
  <div class="inv-title">Your Inventory</div>
  <div class="nav-controls">
    <button class="btn-control btn-sell-all" onclick="sellAll()">💰 Sell All</button>
    <button class="btn-control btn-back" onclick="back()">⬅ Back</button>
  </div>
</div>

<div id="list"></div>

<script>
  const tg = window.Telegram.WebApp;
  
  // Дані користувача з Telegram
  const user = tg.initDataUnsafe.user;
  if (user) {
    document.getElementById("name").innerText = user.first_name;
    if (user.photo_url) document.getElementById("avatar").src = user.photo_url;
  }

  function updateBalanceDisplay() {
    let stars = localStorage.getItem("stars") || "0";
    document.getElementById("balance").innerText = stars;
  }

  function loadItems() {
    let items = JSON.parse(localStorage.getItem("items") || "[]");
    let html = "";

    if (items.length === 0) {
      document.getElementById("list").innerHTML = '<div class="empty-msg">Тут поки порожньо... <br>Відкрий кілька кейсів! 📦</div>';
      updateBalanceDisplay();
      return;
    }

    items.forEach((item, i) => {
      let imgSrc = item.img || ""; 
      html += `
        <div class="item">
          <img src="${imgSrc}">
          <div class="item-name">${item.name}</div>
          <div class="item-price">${item.price || 5} ⭐</div>
          <button class="btn-item-sell" onclick="sell(${i})">Sell</button>
        </div>
      `;
    });

    document.getElementById("list").innerHTML = html;
    updateBalanceDisplay();
  }

  function sell(i) {
    let items = JSON.parse(localStorage.getItem("items") || "[]");
    let stars = parseInt(localStorage.getItem("stars") || "0");
    
    stars += (items[i].price || 5);
    localStorage.setItem("stars", stars);

    items.splice(i, 1);
    localStorage.setItem("items", JSON.stringify(items));

    loadItems();
  }

  function sellAll() {
    let items = JSON.parse(localStorage.getItem("items") || "[]");
    if (items.length === 0) return;

    if(!confirm("Продати всі предмети?")) return;

    let total = items.reduce((sum, item) => sum + (item.price || 5), 0);
    let stars = parseInt(localStorage.getItem("stars") || "0");

    stars += total;
    localStorage.setItem("stars", stars);
    localStorage.setItem("items", JSON.stringify([]));

    alert("Продано за " + total + " ⭐");
    loadItems();
  }

  function back() {
    window.location.href = "index.html";
  }

  loadItems();
</script>

</body>
</html>
