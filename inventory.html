<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory</title>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: radial-gradient(circle at top, #1a1735, #090816 100%);
      color: white;
      min-height: 100vh;
    }

    .top {
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(0, 0, 0, 0.4);
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .buttons {
      display: flex;
      gap: 10px;
    }

    /* Основна сітка інвентарю */
    #list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
      gap: 12px;
      padding: 20px;
    }

    .item {
      background: rgba(255, 255, 255, 0.05);
      border-radius: 12px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      border: 1px solid rgba(255, 255, 255, 0.1);
      transition: all 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .item:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: translateY(-3px);
      border-color: rgba(255, 255, 255, 0.3);
    }

    .item img {
      width: 100%;
      height: 70px;
      object-fit: contain;
      margin-bottom: 8px;
      filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5));
    }

    .item-name {
      font-size: 11px;
      font-weight: bold;
      text-align: center;
      height: 32px;
      overflow: hidden;
      margin-bottom: 5px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .item-price {
      color: gold;
      font-size: 12px;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .item-actions {
      display: flex;
      width: 100%;
      gap: 5px;
    }

    button {
      flex: 1;
      padding: 6px 0;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      font-weight: bold;
      font-size: 10px;
      transition: opacity 0.2s;
    }

    .btn-sell {
      background: #ff4757;
      color: white;
    }

    .btn-withdraw {
      background: #3742fa;
      color: white;
    }

    .btn-nav {
      background: #ff9f43;
      color: black;
      padding: 8px 15px;
      font-size: 13px;
    }

    .btn-back {
      background: rgba(255,255,255,0.1);
      color: white;
      padding: 8px 15px;
    }

    .empty-msg {
      grid-column: 1 / -1;
      text-align: center;
      margin-top: 100px;
      opacity: 0.5;
      font-size: 18px;
    }
  </style>
</head>

<body>

<div class="top">
  <h3 style="margin:0;">🎒 Inventory</h3>

  <div class="buttons">
    <button class="btn-nav" onclick="sellAll()">💰 Sell All</button>
    <button class="btn-back" onclick="back()">⬅ Back</button>
  </div>
</div>

<div id="list"></div>

<script>
  function loadItems() {
    let items = JSON.parse(localStorage.getItem("items") || "[]");
    let html = "";

    if (items.length === 0) {
      document.getElementById("list").innerHTML = '<div class="empty-msg">Your inventory is empty 🌌</div>';
      return;
    }

    items.forEach((item, i) => {
      // Використовуємо картинку, яку зберегли, або стандартну, якщо її немає
      let imgSrc = item.img || "default_skin.png"; 
      
      html += `
        <div class="item">
          <img src="${imgSrc}" alt="${item.name}">
          <div class="item-name">${item.name}</div>
          <div class="item-price">${item.price || 5} ⭐</div>
          <div class="item-actions">
            <button class="btn-sell" onclick="sell(${i})">Sell</button>
            <button class="btn-withdraw" onclick="withdraw(${i})">Get</button>
          </div>
        </div>
      `;
    });

    document.getElementById("list").innerHTML = html;
  }

  function sell(i) {
    let items = JSON.parse(localStorage.getItem("items") || "[]");
    let stars = parseInt(localStorage.getItem("stars") || "0");
    
    stars += items[i].price || 5;
    localStorage.setItem("stars", stars);

    items.splice(i, 1);
    localStorage.setItem("items", JSON.stringify(items));

    loadItems();
  }

  function sellAll() {
    let items = JSON.parse(localStorage.getItem("items") || "[]");
    if (items.length === 0) return;

    let total = 0;
    items.forEach(item => {
      total += item.price || 5;
    });

    let stars = parseInt(localStorage.getItem("stars") || "0");
    stars += total;

    localStorage.setItem("stars", stars);
    localStorage.setItem("items", JSON.stringify([]));

    alert("Продано все за " + total + " ⭐");
    loadItems();
  }

  function withdraw(i) {
    alert("Withdraw coming soon! 🚀");
  }

  function back() {
    window.location.href = "index.html";
  }

  loadItems();
</script>

</body>
</html>
