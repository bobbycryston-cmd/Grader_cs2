<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <title>Grader_cs2</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #0f0c29, #302b63);
      color: white;
    }

    .header {
      display: flex;
      justify-content: flex-end;
      padding: 12px;
      position: relative;
    }

    .profile {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.1);
      padding: 8px 10px;
      border-radius: 12px;
      cursor: pointer;
    }

    .avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
    }

    .menu {
      position: absolute;
      top: 60px;
      right: 12px;
      background: rgba(0,0,0,0.9);
      padding: 12px;
      border-radius: 12px;
      width: 200px;
      display: none;
    }

    .menu button {
      width: 100%;
      margin-top: 8px;
      padding: 8px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .stars {
      margin-top: 10px;
      color: gold;
    }

    .cases {
      padding: 20px;
    }

    .case {
      background: rgba(255,255,255,0.1);
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.2s;
    }

    .case:hover {
      background: rgba(255,255,255,0.2);
    }
  </style>
</head>

<body>

<div class="header">

  <div class="profile" onclick="toggleMenu()">
    <img id="avatar" class="avatar">
    <div id="name">User</div>
  </div>

  <div class="menu" id="menu">

    <div>🔊 Гучність</div>
    <input type="range" min="0" max="100" value="50" style="width:100%">

    <div class="stars">
      ⭐ Баланс: <span id="balance">0</span>
    </div>

    <button onclick="addStars()">➕ Додати зірки</button>

    <button onclick="openInventory()">🎒 Inventory</button>

  </div>

</div>

<div class="cases">
  <div class="case" onclick="openCase(1)">Case 1 ⭐</div>
  <div class="case" onclick="openCase(3)">Case 3 ⭐</div>
  <div class="case" onclick="openCase(5)">Case 5 ⭐</div>
</div>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();

  let stars = 0;

  const user = tg.initDataUnsafe.user;

  if (user) {
    document.getElementById("name").innerText = user.first_name;
    if (user.photo_url) document.getElementById("avatar").src = user.photo_url;
  }

  function toggleMenu() {
    const menu = document.getElementById("menu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
  }

  function addStars() {
    stars += 10;
    document.getElementById("balance").innerText = stars;
  }

  function openInventory() {
    window.location.href = "inventory.html";
  }

  function openCase(price) {
    if (stars < price) {
      alert("Недостатньо ⭐");
      return;
    }

    stars -= price;
    document.getElementById("balance").innerText = stars;

    let items = JSON.parse(localStorage.getItem("items") || "[]");

    let rewards = [
      "AK-47 | Redline",
      "M4A1-S | Cyrex",
      "AWP | Asiimov",
      "Knife | Doppler"
    ];

    let win = rewards[Math.floor(Math.random() * rewards.length)];

    items.push({ name: win });
    localStorage.setItem("items", JSON.stringify(items));

    alert("Тобі випало: " + win);
  }

  document.addEventListener("click", function(e) {
    if (!e.target.closest(".profile")) {
      document.getElementById("menu").style.display = "none";
    }
  });

</script>

</body>
</html>
