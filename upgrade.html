<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <title>Upgrade - Grader_cs2</title>
  <style>
    body {
      margin: 0; font-family: 'Segoe UI', sans-serif;
      background: #0f0c21; color: white; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
    }
    .header { width: 100%; display: flex; justify-content: flex-end; padding: 12px; box-sizing: border-box; }
    .header-box { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.08); padding: 8px 12px; border-radius: 14px; position: relative; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; background: #333; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }
    .menu {
      position: absolute; top: 60px; right: 0; background: #1a1631;
      padding: 10px; border-radius: 12px; width: 150px; display: none; z-index: 1000;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
    }
    .menu button { width: 100%; margin-top: 5px; padding: 10px; border: none; border-radius: 8px; cursor: pointer; color: black; background: white; font-weight: bold; }
    .upgrade-container { width: 100%; max-width: 800px; padding: 15px; box-sizing: border-box; }
    .main-ui { display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 15px; margin-top: 10px; }
    .side-panel {
      flex: 1; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
      border-radius: 15px; height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 10px; position: relative;
    }
    .side-panel img { width: 100px; height: 70px; object-fit: contain; margin-bottom: 10px; }
    .reset-btn {
      position: absolute; top: 8px; right: 8px; background: rgba(255,255,255,0.1);
      border: none; color: white; border-radius: 50%; width: 24px; height: 24px;
      cursor: pointer; font-size: 16px; display: none; z-index: 10;
    }
    .wheel-box { position: relative; width: 240px; height: 240px; flex-shrink: 0; }
    #wheelCanvas { width: 100%; height: 100%; }
    .chance-display {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 28px; font-weight: bold; color: white;
    }
    .controls-row { display: flex; gap: 6px; margin: 20px 0; width: 100%; justify-content: center; flex-wrap: wrap; }
    .btn-quick {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
      color: white; padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold;
    }
    .btn-main-upgrade {
      width: 100%; max-width: 400px; padding: 18px; background: linear-gradient(135deg, #ff9f43 0%, #ff6b6b 100%);
      border: none; border-radius: 12px; color: black; font-weight: 900; font-size: 20px; cursor: pointer;
    }
    .btn-main-upgrade:disabled { opacity: 0.2; }
    .inventory-section { width: 100%; margin-top: 20px; }
    .skin-scroll { display: flex; overflow-x: auto; gap: 12px; padding: 10px 0; min-height: 100px; }
    .skin-item {
      min-width: 100px; background: rgba(255,255,255,0.03); padding: 10px;
      border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.1); cursor: pointer;
    }
    .skin-item.selected { border-color: #ff9f43; background: rgba(255,159,67,0.1); }
    .skin-item img { width: 70px; height: 50px; object-fit: contain; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-box">
    <div style="font-weight:bold;"><span id="balance" style="color:#f1c40f;">0</span> ⭐</div>
    <img id="avatar" class="avatar" onclick="toggleMenu()">
    <div class="menu" id="menu">
      <button onclick="location.href='index.html'">🏠 Home</button>
      <button onclick="location.href='inventory.html'">🎒 Inventory</button>
    </div>
  </div>
</div>

<div class="upgrade-container">
  <div class="main-ui">
    <div class="side-panel">
      <button class="reset-btn" id="resetIn" onclick="resetSelection('in')">×</button>
      <div id="inContent">Select Skin</div>
    </div>
    <div class="wheel-box">
      <canvas id="wheelCanvas" width="500" height="500"></canvas>
      <div class="chance-display" id="chanceText">0%</div>
    </div>
    <div class="side-panel">
      <button class="reset-btn" id="resetOut" onclick="resetSelection('out')">×</button>
      <div id="outContent">Target Skin</div>
    </div>
  </div>

  <div class="controls-row">
    <button class="btn-quick" onclick="autoPick(2)">X2</button>
    <button class="btn-quick" onclick="autoPick(5)">X5</button>
    <button class="btn-quick" onclick="autoPick(10)">X10</button>
    <button class="btn-quick" onclick="autoPickChance(0.3)">30%</button>
    <button class="btn-quick" onclick="autoPickChance(0.5)">50%</button>
    <button class="btn-quick" onclick="autoPickChance(0.75)">75%</button>
  </div>

  <div style="display:flex; justify-content:center;">
    <button class="btn-main-upgrade" id="uBtn" disabled onclick="startUpgrade()">Upgrade</button>
  </div>

  <div class="inventory-section">
    <div class="skin-scroll" id="userInv"></div>
  </div>
</div>

<script>
  let items = JSON.parse(localStorage.getItem("items") || "[]");
  let selIn = null, selOut = null, spinning = false;

  const targets = [
    { name: "Glock-18 | Sacrifice", price: 5, img: "glock18_sacrifice.png" },
    { name: "USP-S | Lead Conduit", price: 5, img: "usp_lead.png" },
    { name: "Glock-18 | Franklin", price: 15, img: "glock18_franklin.png" },
    { name: "USP-S | Ticket to Hell", price: 15, img: "usp_ticket.png" },
    { name: "Glock-18 | Water Elemental", price: 40, img: "glock18_water_elemental.png" },
    { name: "USP-S | Cortex", price: 40, img: "usp_cortex.png" },
    { name: "Glock-18 | Neo-Noir", price: 100, img: "glock18_neo.png" },
    { name: "USP-S | Kill Confirmed", price: 100, img: "usp_kill.png" },
    { name: "AK-47 | Safari Mesh", price: 10, img: "ak_safari.png" },
    { name: "AK-47 | Redline", price: 200, img: "ak_redline.png" },
    { name: "AK-47 | Safety Net", price: 55, img: "ak_safety.png" }
  ];

  function toggleMenu() {
    const m = document.getElementById("menu");
    m.style.display = m.style.display === "block" ? "none" : "block";
  }

  function resetSelection(type) {
    if(spinning) return;
    if(type === 'in') {
      selIn = null;
      document.getElementById("inContent").innerHTML = "Select Skin";
      document.getElementById("resetIn").style.display = "none";
      document.querySelectorAll(".skin-item").forEach(el => el.classList.remove("selected"));
    } else {
      selOut = null;
      document.getElementById("outContent").innerHTML = "Target Skin";
      document.getElementById("resetOut").style.display = "none";
    }
    update();
  }

  function draw(chance, currentDeg) {
    const canvas = document.getElementById("wheelCanvas");
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0,0,500,500);
    const cx = 250, cy = 250, r = 210;

    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = "#16122d"; ctx.lineWidth = 30; ctx.stroke();

    if (chance > 0) {
      const arcRad = Math.PI * 2 * chance;
      ctx.beginPath();
      ctx.arc(cx, cy, r, (Math.PI/2) - (arcRad/2), (Math.PI/2) + (arcRad/2));
      ctx.strokeStyle = "#ff9f43"; ctx.lineWidth = 30;
      ctx.shadowBlur = 15; ctx.shadowColor = "#ff9f43";
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(currentDeg * Math.PI / 180);
    ctx.beginPath();
    ctx.moveTo(r - 35, -15);
    ctx.lineTo(r + 20, 0);
    ctx.lineTo(r - 35, 15);
    ctx.fillStyle = "white"; ctx.fill();
    ctx.restore();
  }

  function autoPick(mult) {
    if(!selIn || spinning) return;
    pickClosest(selIn.price * mult);
  }

  function autoPickChance(c) {
    if(!selIn || spinning) return;
    pickClosest(selIn.price / c);
  }

  function pickClosest(goal) {
    selOut = targets.reduce((prev, curr) => 
      Math.abs(curr.price - goal) < Math.abs(prev.price - goal) ? curr : prev
    );
    document.getElementById("outContent").innerHTML = `<img src="${selOut.img}"><div>${selOut.name}<br><span style="color:#f1c40f">${selOut.price} ⭐</span></div>`;
    document.getElementById("resetOut").style.display = "block";
    update();
  }

  function selectIn(i) {
    if(spinning) return;
    selIn = {...items[i], index: i};
    document.querySelectorAll(".skin-item").forEach(el => el.classList.remove("selected"));
    document.getElementById(`inv-${i}`).classList.add("selected");
    document.getElementById("inContent").innerHTML = `<img src="${selIn.img}"><div>${selIn.name}<br><span style="color:#f1c40f">${selIn.price} ⭐</span></div>`;
    document.getElementById("resetIn").style.display = "block";
    update();
  }

  function update() {
    if(selIn && selOut) {
      let c = Math.min(selIn.price / selOut.price, 0.95);
      document.getElementById("chanceText").innerText = Math.floor(c * 100) + "%";
      draw(c, 90);
      document.getElementById("uBtn").disabled = false;
    } else {
      document.getElementById("chanceText").innerText = "0%";
      draw(0, 90);
      document.getElementById("uBtn").disabled = true;
    }
  }

  function startUpgrade() {
    if(spinning) return;
    spinning = true;
    document.getElementById("uBtn").disabled = true;

    const chance = Math.min(selIn.price / selOut.price, 0.95);
    const win = Math.random() < chance;
    const chanceDeg = chance * 360;
    const halfChance = chanceDeg / 2;
    const spins = 6 + Math.floor(Math.random() * 3);
    
    let finalAngle;
    if(win) {
      finalAngle = 90 + (Math.random() * (chanceDeg * 0.9) - (halfChance * 0.9));
    } else {
      const gap = 10;
      const failRange = 360 - chanceDeg - (gap * 2);
      finalAngle = 90 + halfChance + gap + (Math.random() * failRange);
    }

    const startDeg = 90;
    const totalDist = (spins * 360) + (finalAngle - startDeg);
    let startTime = null;

    function animate(t) {
      if(!startTime) startTime = t;
      let prog = Math.min((t - startTime) / 4800, 1);
      let ease = 1 - Math.pow(1 - prog, 4);
      let currentPos = startDeg + (totalDist * ease);
      
      draw(chance, currentPos % 360);

      if(prog < 1) requestAnimationFrame(animate);
      else {
        setTimeout(() => {
          if(win) {
            alert("SUCCESS! You got: " + selOut.name);
            items.push({...selOut});
          } else {
            alert("FAILED! Item lost.");
          }
          items.splice(selIn.index, 1);
          localStorage.setItem("items", JSON.stringify(items));
          location.reload();
        }, 500);
      }
    }
    requestAnimationFrame(animate);
  }

  function init() {
    const user = window.Telegram.WebApp.initDataUnsafe.user;
    if(user && user.photo_url) document.getElementById("avatar").src = user.photo_url;
    document.getElementById("balance").innerText = localStorage.getItem("stars") || 0;
    const container = document.getElementById("userInv");
    container.innerHTML = items.length ? items.map((item, i) => `
      <div class="skin-item" onclick="selectIn(${i})" id="inv-${i}">
        <img src="${item.img}">
        <div style="font-size:10px; margin-top:5px;">${item.price} ⭐</div>
      </div>
    `).join("") : "<div style='opacity:0.3; width:100%; text-align:center;'>Inventory Empty</div>";
    draw(0, 90);
  }
  init();
</script>
</body>
</html>
