<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <title>Upgrade - Grader_cs2</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1a1735, #090816 80%);
      color: white;
      min-height: 100vh;
      text-align: center;
    }

    .header {
      display: flex;
      justify-content: flex-end;
      padding: 12px; 
    }

    .header-box {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.08);
      padding: 8px 12px;
      border-radius: 14px;
    }

    .profile { display: flex; align-items: center; gap: 8px; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; background: #333; }
    .balance-box span { color: gold; font-weight: bold; }

    .upgrade-container {
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 20px;
      margin-top: 20px;
    }

    .upgrade-slot {
      width: 130px;
      height: 160px;
      background: rgba(255,255,255,0.05);
      border: 2px dashed rgba(255,255,255,0.2);
      border-radius: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 10px;
      cursor: pointer;
    }

    .upgrade-slot.active { border: 2px solid #ff9f43; background: rgba(255,159,67,0.05); }

    .upgrade-slot img { width: 100px; height: 70px; object-fit: contain; }

    .chance-display {
      font-size: 24px;
      font-weight: bold;
      color: #ff9f43;
      margin: 20px 0;
    }

    .btn-upgrade {
      padding: 15px 40px;
      background: #ff9f43;
      border: none;
      border-radius: 12px;
      font-weight: bold;
      font-size: 18px;
      cursor: pointer;
      color: black;
    }

    .btn-upgrade:disabled { opacity: 0.3; cursor: not-allowed; }

    .inventory-overlay {
      position: fixed;
      bottom: 0; left: 0; width: 100%; height: 60%;
      background: #090816;
      border-top: 2px solid #ff9f43;
      display: none;
      z-index: 1000;
      overflow-y: auto;
      padding: 15px;
    }

    .inv-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .inv-item {
      background: rgba(255,255,255,0.05);
      padding: 10px;
      border-radius: 10px;
      font-size: 10px;
    }

    .inv-item img { width: 100%; height: 50px; object-fit: contain; }

    .btn-back {
      margin-top: 20px;
      background: none;
      border: none;
      color: white;
      text-decoration: underline;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="header">
  <div class="header-box">
    <div class="balance-box"><span id="balance">0</span> ⭐</div>
    <div class="profile">
      <img id="avatar" class="avatar">
      <div id="name">User</div>
    </div>
  </div>
</div>

<h2>⚡ Upgrade</h2>

<div class="upgrade-container">
  <div class="upgrade-slot" id="slotInput" onclick="openSelector('input')">
    <div id="inputLabel">Select Item</div>
  </div>

  <div style="font-size: 30px;">➔</div>

  <div class="upgrade-slot" id="slotOutput" onclick="openSelector('output')">
    <div id="outputLabel">Target Item</div>
  </div>
</div>

<div class="chance-display" id="chanceText">Chance: 0%</div>

<button class="btn-upgrade" id="upgradeBtn" disabled onclick="doUpgrade()">UPGRADE</button>

<br>
<button class="btn-back" onclick="window.location.href='index.html'">⬅ Back to Cases</button>

<!-- Вікно вибору предмета -->
<div class="inventory-overlay" id="inventoryOverlay">
  <div style="display:flex; justify-content: space-between; margin-bottom: 15px;">
    <h3 style="margin:0;">Select Item</h3>
    <button onclick="closeSelector()" style="color:white; background:none; border:none; font-size:20px;">✖</button>
  </div>
  <div class="inv-grid" id="invGrid"></div>
</div>

<script>
  const tg = window.Telegram.WebApp;
  let items = JSON.parse(localStorage.getItem("items") || "[]");
  let selectedInput = null;
  let selectedInputIdx = -1;
  let selectedOutput = null;

  // Всі можливі скіни для вибору цілі (можна розширити)
  const allPossibleSkins = [
    { name: "Glock Wasteland Rebel", price: 80, img: "glock18_wasteland_rebel.png" },
    { name: "Glock Neo-Noir", price: 70, img: "glock18_neo.png" },
    { name: "USP-S Kill Confirmed", price: 100, img: "usp_kill.png" },
    { name: "USP-S Neo-Noir", price: 75, img: "usp_neo.png" },
    { name: "Glock Water Elemental", price: 30, img: "glock18_water_elemental.png" }
  ];

  function init() {
    document.getElementById("balance").innerText = localStorage.getItem("stars") || "0";
    const user = tg.initDataUnsafe.user;
    if (user) {
      document.getElementById("name").innerText = user.first_name;
      if (user.photo_url) document.getElementById("avatar").src = user.photo_url;
    }
  }

  function openSelector(mode) {
    const grid = document.getElementById("invGrid");
    grid.innerHTML = "";
    document.getElementById("inventoryOverlay").style.display = "block";

    if (mode === 'input') {
      if (items.length === 0) { grid.innerHTML = "Inventory empty"; return; }
      items.forEach((item, i) => {
        grid.innerHTML += `
          <div class="inv-item" onclick="selectInput(${i})">
            <img src="${item.img}">
            <div>${item.name}</div>
            <div style="color:gold">${item.price} ⭐</div>
          </div>`;
      });
    } else {
      allPossibleSkins.forEach((skin, i) => {
        grid.innerHTML += `
          <div class="inv-item" onclick="selectOutput(${i})">
            <img src="${skin.img}">
            <div>${skin.name}</div>
            <div style="color:gold">${skin.price} ⭐</div>
          </div>`;
      });
    }
  }

  function closeSelector() { document.getElementById("inventoryOverlay").style.display = "none"; }

  function selectInput(i) {
    selectedInput = items[i];
    selectedInputIdx = i;
    document.getElementById("slotInput").innerHTML = `<img src="${selectedInput.img}"><div>${selectedInput.name}</div>`;
    document.getElementById("slotInput").classList.add("active");
    closeSelector();
    updateChance();
  }

  function selectOutput(i) {
    selectedOutput = allPossibleSkins[i];
    document.getElementById("slotOutput").innerHTML = `<img src="${selectedOutput.img}"><div>${selectedOutput.name}</div>`;
    document.getElementById("slotOutput").classList.add("active");
    closeSelector();
    updateChance();
  }

  function updateChance() {
    if (selectedInput && selectedOutput) {
      // Формула: (Ціна твого / Ціна цілі) * 90 (щоб казино завжди було в плюсі на 10%)
      let chance = (selectedInput.price / selectedOutput.price) * 90;
      if (chance > 95) chance = 95; // Макс шанс 95%
      
      document.getElementById("chanceText").innerText = `Chance: ${chance.toFixed(1)}%`;
      document.getElementById("upgradeBtn").disabled = false;
    }
  }

  function doUpgrade() {
    let chance = (selectedInput.price / selectedOutput.price) * 90;
    if (chance > 95) chance = 95;
    
    let roll = Math.random() * 100;
    
    // Видаляємо старий предмет в будь-якому випадку
    items.splice(selectedInputIdx, 1);

    if (roll <= chance) {
      alert("🎉 SUCCESS! You got: " + selectedOutput.name);
      items.push(selectedOutput);
    } else {
      alert("❌ FAILED! Item broken.");
    }

    localStorage.setItem("items", JSON.stringify(items));
    location.reload(); // Перезавантаження для скидання станів
  }

  init();
</script>
</body>
</html>
