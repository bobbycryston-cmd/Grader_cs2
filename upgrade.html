<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <title>Upgrade - Grader_cs2</title>
  <style>
    body {
      margin: 0; font-family: 'Segoe UI', sans-serif;
      background: #0f0c21; color: white; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
    }
    .header { width: 100%; display: flex; justify-content: flex-end; padding: 12px; box-sizing: border-box; }
    .header-box { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.08); padding: 8px 12px; border-radius: 14px; position: relative; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; background: #333; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }
    .menu {
      position: absolute; top: 60px; right: 0; background: #1a1631;
      padding: 10px; border-radius: 12px; width: 150px; display: none; z-index: 1000;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1);
    }
    .menu button { width: 100%; margin-top: 5px; padding: 10px; border: none; border-radius: 8px; cursor: pointer; color: black; background: white; font-weight: bold; }
    .upgrade-container { width: 100%; max-width: 800px; padding: 15px; box-sizing: border-box; }
    .main-ui { display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 15px; margin-top: 10px; }
    .side-panel {
      flex: 1; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
      border-radius: 15px; min-height: 220px; display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 15px; position: relative; box-sizing: border-box;
    }
    .stacked-skins {
      display: flex; flex-wrap: wrap; gap: 6px; align-items: center; justify-content: center;
      width: 100%; padding: 5px 0; margin-bottom: 5px;
    }
    .stacked-skins img { width: 50px !important; height: 35px !important; margin-bottom: 0 !important; object-fit: contain; }
    .side-panel img { width: 100px; height: 70px; object-fit: contain; margin-bottom: 10px; }
    .reset-btn {
      position: absolute; top: 8px; right: 8px; background: rgba(255,255,255,0.1);
      border: none; color: white; border-radius: 50%; width: 24px; height: 24px;
      cursor: pointer; font-size: 16px; display: none; z-index: 10;
    }
    .wheel-box { position: relative; width: 240px; height: 240px; flex-shrink: 0; }
    #wheelCanvas { width: 100%; height: 100%; }
    
    .chance-display {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-weight: bold; color: white; text-align: center; width: 90%;
      pointer-events: none; line-height: 1.2;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
    }
    #chanceNum { font-size: 28px; transition: color 0.3s ease; }
    #chanceSubText { font-size: 10px; font-weight: bold; margin-top: 3px; text-transform: uppercase; letter-spacing: 0.8px; transition: color 0.3s ease; }

    .controls-row { display: flex; gap: 6px; margin: 20px 0; width: 100%; justify-content: center; flex-wrap: wrap; }
    .btn-quick {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
      color: white; padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold;
    }
    .btn-main-upgrade {
      width: 100%; max-width: 400px; padding: 18px; background: linear-gradient(135deg, #ff9f43 0%, #ff6b6b 100%);
      border: none; border-radius: 12px; color: black; font-weight: 900; font-size: 20px; cursor: pointer;
    }
    .btn-main-upgrade:disabled { opacity: 0.2; }
    
    .inventory-section { width: 100%; margin-top: 25px; }
    .skin-scroll { 
      display: flex; 
      flex-wrap: wrap;
      gap: 12px; 
      padding: 10px 0; 
      justify-content: center;
    }
    .skin-item {
      width: calc(33.33% - 8px);
      max-width: 110px;
      background: rgba(255,255,255,0.03); padding: 10px;
      border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.1); cursor: pointer;
      box-sizing: border-box;
    }
    .skin-item.selected { border-color: #ff9f43; background: rgba(255,159,67,0.1); }
    .skin-item img { width: 100%; height: 50px; object-fit: contain; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-box">
    <div style="font-weight:bold;"><span id="balance" style="color:#f1c40f;">0</span> ⭐</div>
    <img id="avatar" class="avatar" onclick="toggleMenu()">
    <div class="menu" id="menu">
      <button onclick="location.href='index.html'">🏠 Home</button>
      <button onclick="location.href='inventory.html'">🎒 Inventory</button>
    </div>
  </div>
</div>

<div class="upgrade-container">
  <div class="main-ui">
    <div class="side-panel">
      <button class="reset-btn" id="resetIn" onclick="resetSelection('in')">×</button>
      <div id="inContent" style="width:100%;">Select Skin</div>
    </div>
    <div class="wheel-box">
      <canvas id="wheelCanvas" width="500" height="500"></canvas>
      <div class="chance-display">
        <div id="chanceNum">0%</div>
        <div id="chanceSubText"></div>
      </div>
    </div>
    <div class="side-panel">
      <button class="reset-btn" id="resetOut" onclick="resetSelection('out')">×</button>
      <div id="outContent">Target Skin</div>
    </div>
  </div>

  <div class="controls-row">
    <button class="btn-quick" onclick="autoPick(2)">X2</button>
    <button class="btn-quick" onclick="autoPick(5)">X5</button>
    <button class="btn-quick" onclick="autoPick(10)">X10</button>
    <button class="btn-quick" onclick="autoPickChance(0.3)">30%</button>
    <button class="btn-quick" onclick="autoPickChance(0.5)">50%</button>
    <button class="btn-quick" onclick="autoPickChance(0.75)">75%</button>
  </div>

  <div style="display:flex; justify-content:center;">
    <button class="btn-main-upgrade" id="uBtn" disabled onclick="startUpgrade()">Upgrade</button>
  </div>

  <div class="inventory-section">
    <div class="skin-scroll" id="userInv"></div>
  </div>
</div>

<script>
  let items = JSON.parse(localStorage.getItem("items") || "[]");
  let selIn = [], selOut = null, spinning = false;
  let currentStatus = "idle";

  const targets = [
    { name: "Glock-18 | Oxide Blaze", price: 5, img: "glock18_oxide_blaze.png" },
    { name: "Glock-18 | Sacrifice", price: 5, img: "glock18_sacrifice.png" },
    { name: "Glock-18 | Clear Polymer", price: 5, img: "glock18_clear_polymer.png" },
    { name: "Glock-18 | Warhawk", price: 5, img: "glock18_warhawk.png" },
    { name: "Glock-18 | Catacombs", price: 5, img: "glock18_catacombs.png" },
    { name: "Glock-18 | Wraiths", price: 5, img: "glock18_wraiths.png" },
    { name: "Glock-18 | Off World", price: 5, img: "glock18_off_world.png" },
    { name: "Glock-18 | Ironwork", price: 5, img: "glock18_ironwork.png" },
    { name: "Glock-18 | Bunset Burner", price: 5, img: "glock18_bunset_burner.png" },
    { name: "Glock-18 | Blue Fissure", price: 5, img: "glock18_blue_fissure.png" },
    { name: "Glock-18 | Candy Apple", price: 5, img: "glock18_candy_apple.png" },
    { name: "Glock-18 | Reactor", price: 5, img: "glock18_reactor.png" },
    { name: "USP-S | Purple DDPAT", price: 5, img: "usp_purple.png" },
    { name: "USP-S | Night Ops", price: 5, img: "usp_night.png" },
    { name: "USP-S | Business Class", price: 5, img: "usp_business.png" },
    { name: "USP-S | Blood Tiger", price: 5, img: "usp_blood.png" },
    { name: "USP-S | Black Lotus", price: 5, img: "usp_black.png" },
    { name: "USP-S | Check Engine", price: 5, img: "usp_check.png" },
    { name: "USP-S | Torque", price: 5, img: "usp_torque.png" },
    { name: "USP-S | Lead Conduit", price: 5, img: "usp_lead.png" },

    { name: "Glock-18 | Death Rattle", price: 15, img: "glock18_death_rattle.png" },
    { name: "Glock-18 | High Beam", price: 15, img: "glock18_high_beam.png" },
    { name: "Glock-18 | Night", price: 15, img: "glock18_night.png" },
    { name: "Glock-18 | Sand Dune", price: 15, img: "glock18_sand_dune.png" },
    { name: "Glock-18 | Groundwater", price: 15, img: "glock18_groundwater.png" },
    { name: "USP-S | Forest Leaves", price: 15, img: "usp_forest.png" },
    { name: "USP-S | Pathfinder", price: 15, img: "usp_pathfinder.png" },
    { name: "USP-S | Royal Blue", price: 15, img: "usp_royal.png" },
    { name: "USP-S | Para Green", price: 15, img: "usp_para.png" },

    { name: "Glock-18 | Nuclear Garden", price: 30, img: "glock18_nuclear_garden.png" },
    { name: "Glock-18 | Franklin", price: 30, img: "glock18_franklin.png" },
    { name: "Glock-18 | Brass", price: 30, img: "glock18_brass.png" },
    { name: "Glock-18 | Steel Disruption", price: 30, img: "glock18_steel_disruption.png" },
    { name: "Glock-18 | Royal Legion", price: 30, img: "glock18_royal_legion.png" },
    { name: "Glock-18 | Grinder", price: 30, img: "glock18_grinder.png" },
    { name: "Glock-18 | Moonrise", price: 30, img: "glock18_m.png" },
    { name: "Glock-18 | Weasel", price: 30, img: "glock18_weasel.png" },
    { name: "USP-S | Overgrowth", price: 30, img: "usp_overgrowth.png" },
    { name: "USP-S | Orange Anolis", price: 30, img: "usp_orange.png" },
    { name: "USP-S | Ticket to Hell", price: 30, img: "usp_ticket.png" },
    { name: "USP-S | Flashback", price: 30, img: "usp_flashback.png" },
    { name: "USP-S | Ancient Visions", price: 30, img: "usp_ancient.png" },
    { name: "USP-S | Guardian", price: 30, img: "usp_guardian.png" },
    { name: "USP-S | Cyrex", price: 30, img: "usp_cyrex.png" },
    { name: "USP-S | Road Rash", price: 30, img: "usp_road.png" },

    { name: "Glock-18 | AXIA", price: 70, img: "glock18_axia.png" },
    { name: "Glock-18 | Water Elemental", price: 70, img: "glock18_water_elemental.png" },
    { name: "Glock-18 | Snack Attack", price: 70, img: "glock18_snack_attack.png" },
    { name: "Glock-18 | Vogue", price: 70, img: "glock18_vogue.png" },
    { name: "USP-S | Orion", price: 70, img: "usp_orion.png" },
    { name: "USP-S | Cortex", price: 70, img: "usp_cortex.png" },
    { name: "USP-S | Monster Mashup", price: 70, img: "usp_monster.png" },

    { name: "Glock-18 | Wasteland Rebel", price: 100, img: "glock18_wasteland_rebel.png" },
    { name: "Glock-18 | Bullet Queen", price: 100, img: "glock18_bullet_queen.png" },
    { name: "Glock-18 | Neo-Noir", price: 100, img: "glock18_neo.png" },
    { name: "Glock-18 | Gold Toof", price: 100, img: "glock18_gold_toof.png" },
    { name: "USP-S | Neo-Noir", price: 100, img: "usp_neo.png" },
    { name: "USP-S | Kill Confirmed", price: 100, img: "usp_kill.png" },
    { name: "USP-S | The Traitor", price: 100, img: "usp_the.png" },
    
    { name: "AK-47 | Safari Mesh", price: 10, img: "ak_safari.png" },
    { name: "AK-47 | Safety Net", price: 55, img: "ak_safety.png" },
    { name: "AK-47 | Redline", price: 200, img: "ak_redline.png" }
  ];

  function toggleMenu() {
    const m = document.getElementById("menu");
    m.style.display = m.style.display === "block" ? "none" : "block";
  }

  function getSelInPrice() {
    return selIn.reduce((sum, item) => sum + item.price, 0);
  }

  function resetSelection(type) {
    if(spinning) return;
    currentStatus = "idle";
    if(type === 'in') {
      selIn = [];
      document.getElementById("inContent").innerHTML = "Select Skin";
      document.getElementById("resetIn").style.display = "none";
      document.querySelectorAll(".skin-item").forEach(el => el.classList.remove("selected"));
    } else {
      selOut = null;
      document.getElementById("outContent").innerHTML = "Target Skin";
      document.getElementById("resetOut").style.display = "none";
    }
    update();
  }

  function drawArrow(ctx, cx, cy, r, currentDeg) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(currentDeg * Math.PI / 180);
    
    ctx.shadowBlur = 10;
    ctx.shadowColor = "#ff9f43";
    ctx.fillStyle = "#ff9f43";

    const startX = r - 45;
    const headX = r + 20; 
    const tailWidth = 6;   
    const headSize = 20;   

    ctx.beginPath();
    ctx.moveTo(startX, -tailWidth/2);
    ctx.lineTo(headX - headSize, -tailWidth/2);
    ctx.lineTo(headX - headSize, -headSize/1.5);
    ctx.lineTo(headX, 0);
    ctx.lineTo(headX - headSize, headSize/1.5);
    ctx.lineTo(headX - headSize, tailWidth/2);
    ctx.lineTo(startX, tailWidth/2);
    ctx.closePath();
    
    ctx.fill();
    ctx.restore();
  }

  function draw(chance, currentDeg) {
    const canvas = document.getElementById("wheelCanvas");
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0,0,500,500);
    const cx = 250, cy = 250, r = 210;
    
    ctx.save();
    if(currentStatus === "win") {
      ctx.strokeStyle = "#2ecc71"; ctx.shadowBlur = 20; ctx.shadowColor = "#2ecc71";
    } else if(currentStatus === "fail") {
      ctx.strokeStyle = "#e74c3c"; ctx.shadowBlur = 20; ctx.shadowColor = "#e74c3c";
    } else {
      ctx.strokeStyle = "#16122d"; ctx.shadowBlur = 0;
    }
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.lineWidth = 30; ctx.stroke();
    ctx.restore();
    
    if (chance > 0) {
      const arcRad = Math.PI * 2 * chance;
      ctx.beginPath();
      ctx.arc(cx, cy, r, (Math.PI/2) - (arcRad/2), (Math.PI/2) + (arcRad/2));
      ctx.strokeStyle = "#ff9f43"; ctx.lineWidth = 30;
      if(currentStatus === "idle") {
        ctx.shadowBlur = 15; ctx.shadowColor = "#ff9f43";
      }
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
    
    drawArrow(ctx, cx, cy, r, currentDeg);
  }

  function autoPick(mult) {
    if(selIn.length === 0 || spinning) return;
    currentStatus = "idle";
    pickClosest(getSelInPrice() * mult);
  }

  function autoPickChance(c) {
    if(selIn.length === 0 || spinning) return;
    currentStatus = "idle";
    pickClosest(getSelInPrice() / c);
  }

  function pickClosest(goal) {
    selOut = targets.reduce((prev, curr) => 
      Math.abs(curr.price - goal) < Math.abs(prev.price - goal) ? curr : prev
    );
    document.getElementById("outContent").innerHTML = `<img src="${selOut.img}"><div>${selOut.name}<br><span style="color:#f1c40f">${selOut.price} ⭐</span></div>`;
    document.getElementById("resetOut").style.display = "block";
    update();
  }

  function selectIn(i) {
    if(spinning) return;
    currentStatus = "idle";
    
    const foundIdx = selIn.findIndex(item => item.index === i);
    
    if (foundIdx > -1) {
      selIn.splice(foundIdx, 1);
      document.getElementById(`inv-${i}`).classList.remove("selected");
    } else {
      selIn.push({...items[i], index: i});
      document.getElementById(`inv-${i}`).classList.add("selected");
    }

    const inContent = document.getElementById("inContent");
    if (selIn.length === 0) {
      inContent.innerHTML = "Select Skin";
      document.getElementById("resetIn").style.display = "none";
    } else if (selIn.length === 1) {
      inContent.innerHTML = `<img src="${selIn[0].img}"><div>${selIn[0].name}<br><span style="color:#f1c40f">${selIn[0].price} ⭐</span></div>`;
      document.getElementById("resetIn").style.display = "block";
    } else {
      let html = `<div class="stacked-skins">`;
      selIn.forEach(item => {
        html += `<img src="${item.img}" title="${item.name}">`;
      });
      html += `</div><div>Skins selected: ${selIn.length}<br><span style="color:#f1c40f">${getSelInPrice()} ⭐</span></div>`;
      inContent.innerHTML = html;
      document.getElementById("resetIn").style.display = "block";
    }
    
    update();
  }

  function getChanceVisuals(pct) {
    if (pct >= 0 && pct < 15) {
      return { text: "Very Low Chance", color: "#ff4d4d" };
    } else if (pct >= 15 && pct < 35) {
      return { text: "Low Chance", color: "#ff9f43" };
    } else if (pct >= 35 && pct <= 60) {
      return { text: "Medium Chance", color: "#ffdd57" };
    } else {
      return { text: "High Chance", color: "#2ed573" };
    }
  }

  function update() {
    if(currentStatus !== "idle") return;
    const chanceNumEl = document.getElementById("chanceNum");
    const chanceSubEl = document.getElementById("chanceSubText");

    if(selIn.length > 0 && selOut) {
      let c = Math.min(getSelInPrice() / selOut.price, 0.95);
      let pct = Math.floor(c * 100);
      
      let visuals = getChanceVisuals(pct);
      
      chanceNumEl.innerHTML = pct + "%";
      chanceNumEl.style.color = visuals.color;
      
      chanceSubEl.innerText = visuals.text;
      chanceSubEl.style.color = visuals.color;

      draw(c, 90);
      document.getElementById("uBtn").disabled = false;
    } else {
      chanceNumEl.innerHTML = "0%";
      chanceNumEl.style.color = "white";
      chanceSubEl.innerText = "";
      draw(0, 90);
      document.getElementById("uBtn").disabled = true;
    }
  }

  function startUpgrade() {
    if(spinning) return;
    spinning = true;
    currentStatus = "idle";
    document.getElementById("uBtn").disabled = true;
    
    const totalPriceIn = getSelInPrice();
    const chance = Math.min(totalPriceIn / selOut.price, 0.95);
    const win = Math.random() < chance;
    const chanceDeg = chance * 360;
    const halfChance = chanceDeg / 2;
    const spins = 6 + Math.floor(Math.random() * 3);
    let finalAngle;
    
    if(win) {
      finalAngle = 90 + (Math.random() * (chanceDeg * 0.9) - (halfChance * 0.9));
    } else {
      const gap = 15;
      const failRange = 360 - chanceDeg - (gap * 2);
      finalAngle = 90 + halfChance + gap + (Math.random() * failRange);
    }
    const startDeg = 90;
    const totalDist = (spins * 360) + (finalAngle - startDeg);
    let startTime = null;
    
    // ФІКС БАГУ: Списуємо вибрані скіни ТУТ І ЗАРАЗ (в момент старту)
    let indicesToRemove = selIn.map(item => item.index).sort((a, b) => b - a);
    indicesToRemove.forEach(idx => {
      items.splice(idx, 1);
    });
    localStorage.setItem("items", JSON.stringify(items));
    // -----------------------------------------------------------

    const chanceNumEl = document.getElementById("chanceNum");
    const chanceSubEl = document.getElementById("chanceSubText");

    function animate(t) {
      if(!startTime) startTime = t;
      let prog = Math.min((t - startTime) / 5200, 1);
      let ease = 1 - Math.pow(1 - prog, 6); 
      
      let currentPos = startDeg + (totalDist * ease);
      draw(chance, currentPos % 360);
      
      if(prog < 1) {
        let pct = Math.floor(chance * 100);
        let visuals = getChanceVisuals(pct);
        
        chanceNumEl.innerHTML = pct + "%";
        chanceNumEl.style.color = visuals.color;
        
        chanceSubEl.innerText = visuals.text;
        chanceSubEl.style.color = visuals.color;
        
        requestAnimationFrame(animate);
      } else {
        let savedTarget = {...selOut};
        
        if(win) {
          currentStatus = "win";
          chanceNumEl.innerHTML = "<span style='color:#2ecc71; font-size:18px; font-weight:900;'>Upgrade successful!</span>";
          chanceSubEl.innerText = "";
          items.push({...savedTarget}); // Додаємо виграний скін
          localStorage.setItem("items", JSON.stringify(items)); // Оновлюємо базу даних
        } else {
          currentStatus = "fail";
          chanceNumEl.innerHTML = "<span style='color:#e74c3c; font-size:19px; font-weight:900;'>Upgrade Failed!</span>";
          chanceSubEl.innerText = "";
        }
        
        draw(chance, currentPos % 360);
        
        selIn = [];
        document.getElementById("inContent").innerHTML = "Select Skin";
        document.getElementById("resetIn").style.display = "none";
        
        selOut = savedTarget;
        document.getElementById("outContent").innerHTML = `<img src="${selOut.img}"><div>${selOut.name}<br><span style="color:#f1c40f">${selOut.price} ⭐</span></div>`;
        document.getElementById("resetOut").style.display = "block";
        
        spinning = false;
        init();
      }
    }
    requestAnimationFrame(animate);
  }

  function init() {
    const user = window.Telegram.WebApp.initDataUnsafe.user;
    if(user && user.photo_url) document.getElementById("avatar").src = user.photo_url;
    document.getElementById("balance").innerText = localStorage.getItem("stars") || 0;
    const container = document.getElementById("userInv");
    container.innerHTML = items.length ? items.map((item, i) => `
      <div class="skin-item" onclick="selectIn(${i})" id="inv-${i}">
        <img src="${item.img}">
        <div style="font-size:10px; margin-top:5px;">${item.price} ⭐</div>
      </div>
     `).join("") : "<div style='opacity:0.3; width:100%; text-align:center;'>Inventory Empty</div>";
    
    selIn.forEach(item => {
      const el = document.getElementById(`inv-${item.index}`);
      if(el) el.classList.add("selected");
    });
    
    if(currentStatus === "idle") {
      update();
    }
  }
  init();
</script>
</body>
</html>
