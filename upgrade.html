<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <title>Upgrade - Grader_cs2</title>
  <style>
    body {
      margin: 0; font-family: 'Segoe UI', Roboto, sans-serif;
      background: #0f0c21; color: white; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      overflow-x: hidden;
    }
    .header { width: 100%; display: flex; justify-content: flex-end; padding: 10px; box-sizing: border-box; }
    .header-box { display: flex; align-items: center; gap: 8px; background: rgba(255,255,255,0.08); padding: 6px 12px; border-radius: 12px; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: #333; border: 1px solid rgba(255,255,255,0.2); }
    
    .upgrade-container { width: 100%; max-width: 500px; padding: 10px; box-sizing: border-box; }
    
    .main-ui { 
      display: flex; flex-direction: row; justify-content: center; align-items: center; 
      gap: 10px; margin-top: 10px; flex-wrap: wrap; 
    }
    
    .side-panel {
      flex: 1; min-width: 100px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; height: 140px; display: flex; flex-direction: column; 
      align-items: center; justify-content: center; text-align: center; padding: 5px; position: relative;
    }
    .side-panel img { width: 80%; max-height: 60px; object-fit: contain; }
    .side-panel div { font-size: 11px; margin-top: 5px; line-height: 1.2; }

    .wheel-box { position: relative; width: 180px; height: 180px; flex-shrink: 0; }
    #wheelCanvas { width: 100%; height: 100%; }
    .chance-display {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 22px; font-weight: bold; color: white;
    }

    .controls-row { 
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; 
      margin: 15px 0; width: 100%; 
    }
    .btn-quick {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
      color: white; padding: 8px; border-radius: 8px; cursor: pointer; font-size: 12px; font-weight: bold;
    }

    .btn-main-upgrade {
      width: 100%; padding: 16px; background: linear-gradient(135deg, #ff9f43 0%, #ff6b6b 100%);
      border: none; border-radius: 12px; color: black; font-weight: 900; font-size: 18px; cursor: pointer;
    }
    .btn-main-upgrade:disabled { opacity: 0.2; }

    .inventory-section { width: 100%; margin-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); }
    .skin-scroll { 
      display: flex; overflow-x: auto; gap: 10px; padding: 15px 5px; 
      scrollbar-width: none; -webkit-overflow-scrolling: touch;
    }
    .skin-item {
      min-width: 90px; background: rgba(255,255,255,0.03); padding: 8px;
      border-radius: 10px; text-align: center; border: 1px solid rgba(255,255,255,0.1);
    }
    .skin-item.selected { border-color: #ff9f43; background: rgba(255,159,67,0.1); }
    .skin-item img { width: 60px; height: 40px; object-fit: contain; }
    
    .reset-btn {
      position: absolute; top: 5px; right: 5px; background: rgba(255,255,255,0.15);
      border: none; color: white; border-radius: 50%; width: 20px; height: 20px;
      font-size: 14px; display: none; z-index: 10;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-box">
    <div style="font-size: 14px; font-weight:bold;"><span id="balance">0</span> ⭐</div>
    <img id="avatar" class="avatar">
  </div>
</div>

<div class="upgrade-container">
  <div class="main-ui">
    <div class="side-panel" id="panelIn">
      <button class="reset-btn" id="resetIn" onclick="resetSelection('in')">×</button>
      <div id="inContent">Select Skin</div>
    </div>
    
    <div class="wheel-box">
      <canvas id="wheelCanvas" width="500" height="500"></canvas>
      <div class="chance-display" id="chanceText">0%</div>
    </div>
    
    <div class="side-panel" id="panelOut">
      <button class="reset-btn" id="resetOut" onclick="resetSelection('out')">×</button>
      <div id="outContent">Target Skin</div>
    </div>
  </div>

  <div class="controls-row">
    <button class="btn-quick" onclick="autoPick(2)">X2</button>
    <button class="btn-quick" onclick="autoPick(5)">X5</button>
    <button class="btn-quick" onclick="autoPick(10)">X10</button>
    <button class="btn-quick" onclick="autoPickChance(0.3)">30%</button>
    <button class="btn-quick" onclick="autoPickChance(0.5)">50%</button>
    <button class="btn-quick" onclick="autoPickChance(0.75)">75%</button>
  </div>

  <button class="btn-main-upgrade" id="uBtn" disabled onclick="startUpgrade()">UPGRADE</button>

  <div class="inventory-section">
    <div class="skin-scroll" id="userInv"></div>
  </div>
</div>

<script>
  let items = JSON.parse(localStorage.getItem("items") || "[]");
  let selIn = null, selOut = null, spinning = false;

  const targets = [
    { name: "Glock-18 | Sacrifice", price: 5, img: "glock18_sacrifice.png" },
    { name: "USP-S | Lead Conduit", price: 5, img: "usp_lead.png" },
    { name: "Glock-18 | Franklin", price: 15, img: "glock18_franklin.png" },
    { name: "USP-S | Ticket to Hell", price: 15, img: "usp_ticket.png" },
    { name: "Glock-18 | Water Elemental", price: 40, img: "glock18_water_elemental.png" },
    { name: "USP-S | Cortex", price: 40, img: "usp_cortex.png" },
    { name: "Glock-18 | Neo-Noir", price: 100, img: "glock18_neo.png" },
    { name: "USP-S | Kill Confirmed", price: 100, img: "usp_kill.png" },
    { name: "AK-47 | Safari Mesh", price: 10, img: "ak_safari.png" },
    { name: "AK-47 | Redline", price: 200, img: "ak_redline.png" },
    { name: "AK-47 | Safety Net", price: 55, img: "ak_safety.png" }
  ];

  function draw(chance, currentDeg) {
    const canvas = document.getElementById("wheelCanvas");
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0,0,500,500);
    const cx = 250, cy = 250, r = 210;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = "#16122d"; ctx.lineWidth = 40; ctx.stroke();
    if (chance > 0) {
      const arcRad = Math.PI * 2 * chance;
      ctx.beginPath();
      ctx.arc(cx, cy, r, (Math.PI/2)-(arcRad/2), (Math.PI/2)+(arcRad/2));
      ctx.strokeStyle = "#ff9f43"; ctx.lineWidth = 40;
      ctx.shadowBlur = 15; ctx.shadowColor = "#ff9f43";
      ctx.stroke();
      ctx.shadowBlur = 0;
    }
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(currentDeg * Math.PI / 180);
    ctx.beginPath();
    ctx.moveTo(r - 45, -20);
    ctx.lineTo(r + 25, 0);
    ctx.lineTo(r - 45, 20);
    ctx.fillStyle = "white"; ctx.fill();
    ctx.restore();
  }

  function resetSelection(type) {
    if(spinning) return;
    if(type === 'in') {
      selIn = null;
      document.getElementById("inContent").innerHTML = "Select Skin";
      document.getElementById("resetIn").style.display = "none";
      document.querySelectorAll(".skin-item").forEach(el => el.classList.remove("selected"));
    } else {
      selOut = null;
      document.getElementById("outContent").innerHTML = "Target Skin";
      document.getElementById("resetOut").style.display = "none";
    }
    update();
  }

  function selectIn(i) {
    if(spinning) return;
    selIn = {...items[i], index: i};
    document.querySelectorAll(".skin-item").forEach(el => el.classList.remove("selected"));
    document.getElementById(`inv-${i}`).classList.add("selected");
    document.getElementById("inContent").innerHTML = `<img src="${selIn.img}"><div>${selIn.price} ⭐</div>`;
    document.getElementById("resetIn").style.display = "block";
    update();
  }

  function pickClosest(goal) {
    selOut = targets.reduce((prev, curr) => Math.abs(curr.price - goal) < Math.abs(prev.price - goal) ? curr : prev);
    document.getElementById("outContent").innerHTML = `<img src="${selOut.img}"><div>${selOut.price} ⭐</div>`;
    document.getElementById("resetOut").style.display = "block";
    update();
  }

  function autoPick(mult) { if(selIn && !spinning) pickClosest(selIn.price * mult); }
  function autoPickChance(c) { if(selIn && !spinning) pickClosest(selIn.price / c); }

  function update() {
    if(selIn && selOut) {
      let c = Math.min(selIn.price / selOut.price, 0.95);
      document.getElementById("chanceText").innerText = Math.floor(c * 100) + "%";
      draw(c, 90);
      document.getElementById("uBtn").disabled = false;
    } else {
      document.getElementById("chanceText").innerText = "0%";
      draw(0, 90);
      document.getElementById("uBtn").disabled = true;
    }
  }

  function startUpgrade() {
    if(spinning || !selIn || !selOut) return;
    spinning = true;
    document.getElementById("uBtn").disabled = true;
    const chance = Math.min(selIn.price / selOut.price, 0.95);
    const win = Math.random() < chance;
    const chanceDeg = chance * 360;
    const halfChance = chanceDeg / 2;
    const spins = 7 + Math.floor(Math.random() * 2);
    let finalAngle;
    if(win) finalAngle = 90 + (Math.random() * (chanceDeg * 0.8) - (halfChance * 0.8));
    else finalAngle = 90 + halfChance + 20 + (Math.random() * (320 - chanceDeg));
    
    let startT = null;
    const duration = 4500;
    function anim(t) {
      if(!startT) startT = t;
      let prog = Math.min((t - startT) / duration, 1);
      let ease = 1 - Math.pow(1 - prog, 4);
      draw(chance, (90 + (spins * 360 + (finalAngle - 90)) * ease) % 360);
      if(prog < 1) requestAnimationFrame(anim);
      else {
        setTimeout(() => {
          alert(win ? "SUCCESS! " + selOut.name : "FAILED!");
          if(win) items.push({...selOut});
          items.splice(selIn.index, 1);
          localStorage.setItem("items", JSON.stringify(items));
          location.reload();
        }, 500);
      }
    }
    requestAnimationFrame(anim);
  }

  function init() {
    const user = window.Telegram.WebApp.initDataUnsafe.user;
    if(user && user.photo_url) document.getElementById("avatar").src = user.photo_url;
    document.getElementById("balance").innerText = localStorage.getItem("stars") || 0;
    const container = document.getElementById("userInv");
    container.innerHTML = items.length ? items.map((item, i) => `
      <div class="skin-item" onclick="selectIn(${i})" id="inv-${i}">
        <img src="${item.img}">
        <div style="font-size:10px; margin-top:5px;">${item.price} ⭐</div>
      </div>
    `).join("") : "<div style='opacity:0.3; width:100%; text-align:center;'>Empty</div>";
    draw(0, 90);
  }
  init();
</script>
</body>
</html>
