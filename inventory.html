<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <title>Inventory - Grader_cs2</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1a1735, #090816 80%);
      color: white;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Універсальна шапка */
    .header {
      display: flex;
      justify-content: flex-end;
      padding: 12px; 
      position: relative;
    }

    .header-box {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(255,255,255,0.08);
      padding: 8px 12px;
      border-radius: 14px;
    }

    .balance-box { font-weight: bold; }
    .balance-box span { color: gold; }

    .profile {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #333;
    }

    /* Випадаюче меню */
    .menu {
      position: absolute;
      top: 65px;
      right: 12px;
      background: rgba(0,0,0,0.95);
      padding: 12px;
      border-radius: 12px;
      width: 180px;
      display: none;
      z-index: 2000;
      box-shadow: 0 4px 20px rgba(0,0,0,0.8);
    }

    .menu button {
      width: 100%;
      margin-top: 8px;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      color: black;
      background: #fff;
      font-weight: bold;
    }

    /* Контент інвентарю */
    .inv-content { text-align: center; }
    .inv-title { font-size: 24px; font-weight: bold; margin: 10px 0; }

    .nav-controls {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .btn-control {
      padding: 10px 15px;
      border: none;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-sell-all { background: #ff9f43; color: black; }
    .btn-back { background: rgba(255,255,255,0.1); color: white; }

    #list {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 15px;
      max-width: 500px;
      margin: 0 auto;
    }

    .item {
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      padding: 10px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .item img { width: 100%; height: 50px; object-fit: contain; margin-bottom: 5px; }
    .item-name { font-size: 9px; font-weight: bold; height: 22px; overflow: hidden; }
    .item-price { color: gold; font-size: 10px; margin: 5px 0; }

    .btn-item-sell {
      width: 100%;
      padding: 5px;
      background: #ff4757;
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 9px;
      font-weight: bold;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-box">
    <div class="balance-box"><span id="balance">0</span> ⭐</div>
    <div class="profile" onclick="toggleMenu()">
      <img id="avatar" class="avatar" src="">
      <div id="name">User</div>
    </div>
  </div>

  <div class="menu" id="menu">
    <button onclick="window.location.href='index.html'">🏠 Cases</button>
    <button onclick="window.location.href='upgrade.html'">⚡ Upgrade</button>
    <button onclick="toggleMenu()" style="background: #333; color: white;">❌ Close</button>
  </div>
</div>

<div class="inv-content">
  <div class="inv-title">Inventory</div>
  <div class="nav-controls">
    <button class="btn-control btn-sell-all" onclick="sellAll()">💰 Sell All</button>
    <button class="btn-control btn-back" onclick="window.location.href='index.html'">⬅ Back</button>
  </div>
</div>

<div id="list"></div>

<script>
  const tg = window.Telegram.WebApp;
  const user = tg.initDataUnsafe.user;

  if (user) {
    document.getElementById("name").innerText = user.first_name;
    if (user.photo_url) document.getElementById("avatar").src = user.photo_url;
  }

  function toggleMenu() {
    const m = document.getElementById("menu");
    m.style.display = m.style.display === "block" ? "none" : "block";
  }

  function loadItems() {
    let items = JSON.parse(localStorage.getItem("items") || "[]");
    document.getElementById("balance").innerText = localStorage.getItem("stars") || "0";
    let html = "";

    if (items.length === 0) {
      document.getElementById("list").innerHTML = "<div style='grid-column:1/-1; opacity:0.5; margin-top:50px;'>Empty</div>";
      return;
    }

    items.forEach((item, i) => {
      html += `
        <div class="item">
          <img src="${item.img || ''}">
          <div class="item-name">${item.name}</div>
          <div class="item-price">${item.price || 5} ⭐</div>
          <button class="btn-item-sell" onclick="sell(${i})">Sell</button>
        </div>`;
    });
    document.getElementById("list").innerHTML = html;
  }

  function sell(i) {
    let items = JSON.parse(localStorage.getItem("items") || "[]");
    let stars = parseInt(localStorage.getItem("stars") || "0");
    stars += (items[i].price || 5);
    localStorage.setItem("stars", stars);
    items.splice(i, 1);
    localStorage.setItem("items", JSON.stringify(items));
    loadItems();
  }

  function sellAll() {
    let items = JSON.parse(localStorage.getItem("items") || "[]");
    if (!items.length) return;
    let total = items.reduce((s, item) => s + (item.price || 5), 0);
    let stars = parseInt(localStorage.getItem("stars") || "0") + total;
    localStorage.setItem("stars", stars);
    localStorage.setItem("items", "[]");
    loadItems();
  }

  document.addEventListener("click", (e) => {
    if (!e.target.closest(".profile") && !e.target.closest(".menu")) document.getElementById("menu").style.display = "none";
  });

  loadItems();
</script>
</body>
</html>
