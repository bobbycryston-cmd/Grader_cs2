<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <title>Upgrade - Grader_cs2</title>

  <style>
    body {
      margin: 0; font-family: 'Segoe UI', sans-serif;
      background: #0f0c21; color: white; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
    }

    .header { width: 100%; display: flex; justify-content: flex-end; padding: 12px; box-sizing: border-box; position: relative; }
    .header-box { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.08); padding: 8px 12px; border-radius: 14px; }
    .header-btn { background: #ff9f43; border: none; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; background: #333; cursor: pointer; border: 1px solid rgba(255,255,255,0.2); }

    .upgrade-container { width: 100%; max-width: 800px; padding: 15px; box-sizing: border-box; }
    
    .main-ui { display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 15px; margin-top: 10px; }
    
    .side-panel {
      flex: 1; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05);
      border-radius: 15px; height: 220px; display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 10px; transition: 0.3s;
    }
    .side-panel img { width: 100px; height: 70px; object-fit: contain; margin-bottom: 10px; filter: drop-shadow(0 0 10px rgba(0,0,0,0.5)); }
    .side-panel div { font-size: 13px; font-weight: bold; }

    .wheel-box { position: relative; width: 240px; height: 240px; flex-shrink: 0; }
    #wheelCanvas { width: 100%; height: 100%; }
    .chance-display {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-size: 28px; font-weight: bold; color: white; text-shadow: 0 0 15px rgba(255,159,67,0.6);
    }

    .controls-row { display: flex; gap: 6px; margin: 20px 0; width: 100%; justify-content: center; flex-wrap: wrap; }
    .btn-quick {
      background: rgba(255,255,255,0.07); border: 1px solid rgba(255,255,255,0.1);
      color: white; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: bold; transition: 0.2s;
    }
    .btn-quick:hover { background: rgba(255,255,255,0.15); border-color: #ff9f43; }

    .btn-main-upgrade {
      width: 100%; max-width: 400px; padding: 18px; 
      background: linear-gradient(135deg, #ff9f43 0%, #ff6b6b 100%);
      border: none; border-radius: 12px; color: black; font-weight: 900; font-size: 20px; 
      cursor: pointer; text-transform: uppercase; letter-spacing: 1px;
    }
    .btn-main-upgrade:disabled { opacity: 0.2; filter: grayscale(1); }

    .inventory-section { width: 100%; margin-top: 30px; }
    .skin-scroll { display: flex; overflow-x: auto; gap: 12px; padding: 10px 0; scroll-behavior: smooth; }
    .skin-scroll::-webkit-scrollbar { height: 4px; }
    .skin-scroll::-webkit-scrollbar-thumb { background: #ff9f43; border-radius: 10px; }
    
    .skin-item {
      min-width: 110px; background: rgba(255,255,255,0.03); padding: 12px;
      border-radius: 12px; text-align: center; border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: 0.2s;
    }
    .skin-item.selected { border-color: #ff9f43; background: rgba(255,159,67,0.1); transform: translateY(-5px); }
    .skin-item img { width: 80px; height: 55px; object-fit: contain; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-box">
    <div style="font-weight:bold;"><span id="balance" style="color:#f1c40f;">0</span> ⭐</div>
    <button class="header-btn">+</button>
    <div class="profile" onclick="location.href='index.html'">
      <img id="avatar" class="avatar">
    </div>
  </div>
</div>

<div class="upgrade-container">
  <div class="main-ui">
    <div class="side-panel" id="inPanel">
      <div style="opacity:0.4">Select Item To Upgrade</div>
    </div>
    
    <div class="wheel-box">
      <canvas id="wheelCanvas" width="500" height="500"></canvas>
      <div class="chance-display" id="chanceText">0%</div>
    </div>
    
    <div class="side-panel" id="outPanel">
      <div style="opacity:0.4">Select Target Item</div>
    </div>
  </div>

  <div class="controls-row">
    <button class="btn-quick" onclick="autoPick(2)">X2</button>
    <button class="btn-quick" onclick="autoPick(5)">X5</button>
    <button class="btn-quick" onclick="autoPick(10)">X10</button>
    <button class="btn-quick" onclick="autoPickChance(0.3)">30%</button>
    <button class="btn-quick" onclick="autoPickChance(0.5)">50%</button>
    <button class="btn-quick" onclick="autoPickChance(0.75)">75%</button>
  </div>

  <div style="display:flex; justify-content:center;">
    <button class="btn-main-upgrade" id="uBtn" disabled onclick="startUpgrade()">Upgrade</button>
  </div>

  <div class="inventory-section">
    <h4 style="margin: 0 0 10px 5px; color: #888;">YOUR INVENTORY</h4>
    <div class="skin-scroll" id="userInv"></div>
  </div>
</div>

<script>
  let items = JSON.parse(localStorage.getItem("items") || "[]");
  let selIn = null, selOut = null, spinning = false;

  const targets = [
    { name: "Glock Water", price: 40, img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgposbaqKAxf0Ob3fDJ954jjg87IxvX3P77em29U-8xeh-zF_Jn4xgXirhVqY2_1ctfDIQ9vYV6B_FntxL_rhp_vup7AnXNq73R37S3Umwv3309_9XG7XQ" },
    { name: "USP Neo-Noir", price: 100, img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpoo6m1FBRp3_bGcjhQ09-jq5WYh8j_OrfdqWhe5sN4mOTE8bP4jVC9vh5yYG7wI47HIAU4YF3S81e5xb_rh5S0vszInScy73Yh4S6JnECpwUYb-p8pEw" },
    { name: "AK-47 Asiimov", price: 300, img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpot7HxfDhjxszJemkV09-5lpKKqPrxN7LEmyVQ7MEpiLuSrY6i2VHt-0s9ODuicY_AcVNoMF_R_AK9kO_n08S6vJvAnXcx6Sclt3_D30vgbe_72j0" },
    { name: "AWP Hyper Beast", price: 600, img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpot621FAR17PLfYQJD_9W7m5a0mvLwOq7c2G1QvJByiL_E99Sk3ALsr0ZpZz_6I4-ccVVsMFvX-1O3w7y605S1vczAn3E2v3Em4XfD30vgTMo_H2E" },
    { name: "M4A4 Howl", price: 2000, img: "https://community.cloudflare.steamstatic.com/economy/image/-9a81dlWLwJ2UUGcVs_nsVtzdOEdtWwKGZZLQHTxDZ7I56KU0Zwwo4NUX4oFJZEHLbXH5ApeO4YmlhxYQknCRvCo04DEVlxkKgpou-6kejhjxszFJTwW09Kzm7-FmP7mDLfYkWNF18lwmO7Eu46j3VHt_0VvMT31LY-QdFVqYV7Y_gS-xeu605S-7s7NynRi6XIn4S2OnBapwUYbR_m_7RE" }
  ];

  function draw(chance, arrowAngle = 0) {
    const canvas = document.getElementById("wheelCanvas");
    const ctx = canvas.getContext("2d");
    ctx.clearRect(0,0,500,500);
    const cx = 250, cy = 250, r = 220;

    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.strokeStyle = "#16122d"; ctx.lineWidth = 20; ctx.stroke();

    if (chance > 0) {
      ctx.beginPath();
      ctx.arc(cx, cy, r, -Math.PI/2, (-Math.PI/2) + (Math.PI * 2 * chance));
      ctx.strokeStyle = "#ff9f43";
      ctx.shadowBlur = 15; ctx.shadowColor = "#ff9f43";
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(arrowAngle - Math.PI/2);
    
    ctx.beginPath();
    ctx.moveTo(r - 30, -10);
    ctx.lineTo(r + 15, 0);
    ctx.lineTo(r - 30, 10);
    ctx.fillStyle = "white";
    ctx.fill();
    ctx.restore();
  }

  function autoPick(mult) {
    if(!selIn || spinning) return;
    pickClosest(selIn.price * mult);
  }

  function autoPickChance(c) {
    if(!selIn || spinning) return;
    pickClosest(selIn.price / c);
  }

  function pickClosest(goal) {
    selOut = targets.reduce((prev, curr) => 
      Math.abs(curr.price - goal) < Math.abs(prev.price - goal) ? curr : prev
    );
    document.getElementById("outPanel").innerHTML = `<img src="${selOut.img}"><div>${selOut.name}<br><span style="color:#f1c40f">${selOut.price} ⭐</span></div>`;
    update();
  }

  function update() {
    if(selIn && selOut) {
      let c = Math.min(selIn.price / selOut.price, 1);
      document.getElementById("chanceText").innerText = Math.floor(c * 100) + "%";
      draw(c);
      document.getElementById("uBtn").disabled = false;
    }
  }

  function startUpgrade() {
    if(spinning) return;
    spinning = true;
    document.getElementById("uBtn").disabled = true;

    const chance = selIn.price / selOut.price;
    const win = Math.random() < chance;
    const spins = 5 + Math.random() * 3; 
    let targetAngle;

    if(win) {
      targetAngle = Math.random() * (chance * Math.PI * 2);
    } else {
      targetAngle = (chance * Math.PI * 2) + Math.random() * ((1 - chance) * Math.PI * 2);
    }

    const finalAngle = (Math.PI * 2 * spins) + targetAngle;
    let start = null;

    function animate(t) {
      if(!start) start = t;
      let prog = (t - start) / 4000;
      if(prog > 1) prog = 1;

      let ease = 1 - Math.pow(1 - prog, 3);
      draw(chance, finalAngle * ease);

      if(prog < 1) requestAnimationFrame(animate);
      else {
        setTimeout(() => {
          if(win) {
            alert("SUCCESS! Received: " + selOut.name);
            items.push(selOut);
          } else {
            alert("FAILED! Skin lost.");
          }
          items.splice(selIn.index, 1);
          localStorage.setItem("items", JSON.stringify(items));
          location.reload();
        }, 500);
      }
    }
    requestAnimationFrame(animate);
  }

  function init() {
    const user = window.Telegram.WebApp.initDataUnsafe.user;
    if(user && user.photo_url) document.getElementById("avatar").src = user.photo_url;
    document.getElementById("balance").innerText = localStorage.getItem("stars") || 0;
    
    const container = document.getElementById("userInv");
    container.innerHTML = items.length ? items.map((item, i) => `
      <div class="skin-item" onclick="selectIn(${i})" id="inv-${i}">
        <img src="${item.img}">
        <div style="margin-top:5px">${item.price} ⭐</div>
      </div>
    `).join("") : "<div style='opacity:0.3; padding:20px;'>Empty</div>";
    
    draw(0);
  }

  function selectIn(i) {
    if(spinning) return;
    selIn = {...items[i], index: i};
    document.querySelectorAll(".skin-item").forEach(el => el.classList.remove("selected"));
    document.getElementById(`inv-${i}`).classList.add("selected");
    document.getElementById("inPanel").innerHTML = `<img src="${selIn.img}"><div>${selIn.name}<br><span style="color:#f1c40f">${selIn.price} ⭐</span></div>`;
    update();
  }

  init();
</script>
</body>
</html>
