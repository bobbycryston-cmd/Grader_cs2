<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <title>Upgrade - Grader_cs2</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #1a1735, #090816 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* Універсальна шапка */
    .header { width: 100%; display: flex; justify-content: flex-end; padding: 12px; box-sizing: border-box; position: relative; }
    .header-box { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.08); padding: 8px 12px; border-radius: 14px; }
    .avatar { width: 32px; height: 32px; border-radius: 50%; background: #333; }
    .balance-box span { color: gold; font-weight: bold; }

    /* Меню */
    .menu {
      position: absolute; top: 65px; right: 12px; background: rgba(0,0,0,0.95);
      padding: 12px; border-radius: 12px; width: 180px; display: none; z-index: 2000;
    }
    .menu button { width: 100%; margin-top: 8px; padding: 10px; border: none; border-radius: 8px; font-weight: bold; }

    /* Рулетка */
    .upgrade-center { position: relative; width: 200px; height: 200px; margin: 10px 0; }
    canvas { width: 100%; height: 100%; transform: rotate(-90deg); }
    .chance-info { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
    .chance-info span { font-size: 24px; font-weight: bold; color: #ff9f43; }

    /* Списки скінів */
    .skin-row { display: flex; overflow-x: auto; gap: 10px; padding: 10px; width: 100%; box-sizing: border-box; }
    .skin-row::-webkit-scrollbar { display: none; }
    .skin-card { 
      min-width: 80px; background: rgba(255,255,255,0.05); padding: 8px; 
      border-radius: 10px; text-align: center; border: 1px solid transparent; 
    }
    .skin-card.selected { border-color: #ff9f43; background: rgba(255,159,67,0.1); }
    .skin-card img { width: 60px; height: 40px; object-fit: contain; }
    .skin-card div { font-size: 9px; margin-top: 3px; }

    .slots { display: flex; gap: 15px; margin: 10px 0; }
    .slot { 
      width: 100px; height: 120px; background: rgba(255,255,255,0.05); 
      border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
      display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px;
    }
    .slot img { width: 70px; height: 45px; object-fit: contain; }

    .btn-upgrade { width: 85%; padding: 15px; background: #ff9f43; border: none; border-radius: 12px; font-weight: bold; font-size: 18px; margin: 10px 0; }
    h4 { margin: 10px 15px 5px; align-self: flex-start; font-size: 14px; color: #aaa; }
  </style>
</head>
<body>

<div class="header">
  <div class="header-box">
    <div class="balance-box"><span id="balance">0</span> ⭐</div>
    <div class="profile" onclick="toggleMenu()">
      <img id="avatar" class="avatar">
      <div id="name">User</div>
    </div>
  </div>
  <div class="menu" id="menu">
    <button onclick="window.location.href='index.html'">🏠 Cases</button>
    <button onclick="window.location.href='inventory.html'">🎒 Inventory</button>
    <button onclick="toggleMenu()" style="background: #333; color: white;">❌ Close</button>
  </div>
</div>

<div class="upgrade-center">
  <canvas id="wheelCanvas" width="300" height="300"></canvas>
  <div class="chance-info"><span id="chanceValue">0%</span></div>
</div>

<div class="slots">
  <div class="slot" id="inSlot">Select In</div>
  <div class="slot" id="outSlot">Select Target</div>
</div>

<button class="btn-upgrade" id="upgradeBtn" disabled onclick="startUpgrade()">UPGRADE</button>

<h4>Your Inventory</h4>
<div class="skin-row" id="userInv"></div>
<h4>Targets</h4>
<div class="skin-row" id="targetInv"></div>

<script>
  let items = JSON.parse(localStorage.getItem("items") || "[]");
  let selIn = null, selOut = null, isSpinning = false;

  const targets = [
    { name: "Glock Wasteland Rebel", price: 100, img: "glock18_wasteland_rebel.png" },
    { name: "USP-S Kill Confirmed", price: 150, img: "usp_kill.png" },
    { name: "Glock Neo-Noir", price: 70, img: "glock18_neo.png" },
    { name: "Glock Water Elemental", price: 40, img: "glock18_water_elemental.png" }
  ];

  function init() {
    const user = window.Telegram.WebApp.initDataUnsafe.user;
    if(user) {
      document.getElementById("name").innerText = user.first_name;
      if(user.photo_url) document.getElementById("avatar").src = user.photo_url;
    }
    render();
    draw(0);
  }

  function toggleMenu() {
    const m = document.getElementById("menu");
    m.style.display = m.style.display === "block" ? "none" : "block";
  }

  function render() {
    document.getElementById("balance").innerText = localStorage.getItem("stars") || "0";
    const uInv = document.getElementById("userInv");
    uInv.innerHTML = items.length ? "" : "Empty";
    items.forEach((item, i) => {
      uInv.innerHTML += `<div class="skin-card" onclick="selectIn(${i})" id="u-${i}"><img src="${item.img}"><div>${item.price}⭐</div></div>`;
    });
    const tInv = document.getElementById("targetInv");
    tInv.innerHTML = "";
    targets.forEach((item, i) => {
      tInv.innerHTML += `<div class="skin-card" onclick="selectOut(${i})" id="t-${i}"><img src="${item.img}"><div>${item.price}⭐</div></div>`;
    });
  }

  function selectIn(i) {
    if(isSpinning) return;
    selIn = { ...items[i], index: i };
    document.getElementById("inSlot").innerHTML = `<img src="${selIn.img}"><div>${selIn.price}⭐</div>`;
    update();
  }

  function selectOut(i) {
    if(isSpinning) return;
    selOut = targets[i];
    document.getElementById("outSlot").innerHTML = `<img src="${selOut.img}"><div>${selOut.price}⭐</div>`;
    update();
  }

  function update() {
    if(selIn && selOut) {
      let c = Math.min((selIn.price / selOut.price), 1);
      document.getElementById("chanceValue").innerText = (c * 100).toFixed(1) + "%";
      draw(c);
      document.getElementById("upgradeBtn").disabled = false;
    }
  }

  function draw(p, a = 0) {
    const ctx = document.getElementById("wheelCanvas").getContext("2d");
    ctx.clearRect(0,0,300,300);
    ctx.lineWidth = 15;
    ctx.beginPath(); ctx.arc(150,150,130,0,Math.PI*2); ctx.strokeStyle="#222"; ctx.stroke();
    ctx.beginPath(); ctx.arc(150,150,130,0,Math.PI*2*p); ctx.strokeStyle="#ff9f43"; ctx.stroke();
    if(isSpinning) {
      ctx.save(); ctx.translate(150,150); ctx.rotate(a);
      ctx.beginPath(); ctx.moveTo(110,0); ctx.lineTo(145,0); ctx.strokeStyle="white"; ctx.lineWidth=5; ctx.stroke();
      ctx.restore();
    }
  }

  function startUpgrade() {
    isSpinning = true; document.getElementById("upgradeBtn").disabled = true;
    let c = selIn.price / selOut.price;
    let start = null, duration = 3000, final = (Math.PI*2*8) + (Math.random()*Math.PI*2);
    function anim(t) {
      if(!start) start = t;
      let prog = t - start;
      let rot = (prog/duration) * final;
      draw(c, rot);
      if(prog < duration) requestAnimationFrame(anim);
      else {
        isSpinning = false;
        if((rot % (Math.PI*2)) <= (c * Math.PI*2)) {
          alert("Success!"); items.splice(selIn.index, 1); items.push(selOut);
        } else {
          alert("Failed!"); items.splice(selIn.index, 1);
        }
        localStorage.setItem("items", JSON.stringify(items)); location.reload();
      }
    }
    requestAnimationFrame(anim);
  }

  init();
</script>
</body>
</html>
